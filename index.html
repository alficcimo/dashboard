<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Farm Dashboard</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>
  <script>
    const GITHUB_REPO = 'alficcimo/dashboard';
    
    const TABS = [
      { id: 'ideas', label: 'Ideas', file: 'ideas.json' },
      { id: 'analyzed', label: 'Analyzed', file: 'ideas-analyzer.json' },
      { id: 'titles', label: 'Titles', file: 'titles.json' },
      { id: 'captions', label: 'Captions', file: 'captions.json' },
      { id: 'carousels', label: 'Carousels', file: 'carousels.json' }
    ];

    const COLUMN_DEFS = {
      ideas: ['date', 'source', 'idea'],
      analyzed: ['date', 'idea', 'psychology', 'energy', 'king', 'magic_pill', 'summary'],
      titles: ['date', 'title', 'angle'],
      captions: ['date', 'title', 'caption'],
      carousels: ['date', 'title', 'carousel', 'caption_under']
    };

    function App() {
      const [activeTab, setActiveTab] = React.useState('ideas');
      const [data, setData] = React.useState({});
      const [loading, setLoading] = React.useState(true);

      React.useEffect(() => {
        const loadData = async () => {
          const newData = {};
          for (const tab of TABS) {
            try {
              const res = await fetch(`https://raw.githubusercontent.com/${GITHUB_REPO}/master/${tab.file}`);
              if (res.ok) {
                newData[tab.id] = await res.json();
              } else {
                newData[tab.id] = [];
              }
            } catch (e) {
              console.error(`Failed to load ${tab.file}:`, e);
              newData[tab.id] = [];
            }
          }
          setData(newData);
          setLoading(false);
        };
        loadData();
        const interval = setInterval(loadData, 5000);
        return () => clearInterval(interval);
      }, []);

      const currentTab = TABS.find(t => t.id === activeTab);
      const rows = data[activeTab] || [];
      const columns = COLUMN_DEFS[activeTab] || [];

      return React.createElement('div', { className: 'min-h-screen bg-gray-50' },
        React.createElement('div', { className: 'max-w-7xl mx-auto py-6 px-4' },
          React.createElement('h1', { className: 'text-3xl font-bold mb-6 text-gray-900' }, 'Content Farm Dashboard'),
          React.createElement('div', { className: 'flex gap-2 mb-6 border-b' },
            TABS.map(tab =>
              React.createElement('button', {
                key: tab.id,
                onClick: () => setActiveTab(tab.id),
                className: `px-4 py-2 font-medium ${activeTab === tab.id ? 'border-b-2 border-blue-500 text-blue-600' : 'text-gray-600 hover:text-gray-900'}`
              }, `${tab.label} (${(data[tab.id] || []).length})`)
            )
          ),
          loading ? React.createElement('div', { className: 'text-center py-12 text-gray-500' }, 'Loading...') :
          React.createElement('div', { className: 'bg-white rounded-lg shadow overflow-hidden' },
            rows.length === 0 ? React.createElement('div', { className: 'p-8 text-center text-gray-500' }, 'No data') :
            React.createElement('table', { className: 'w-full' },
              React.createElement('thead', { className: 'bg-gray-100 border-b' },
                React.createElement('tr', {},
                  columns.map(col =>
                    React.createElement('th', { key: col, className: 'px-6 py-3 text-left text-sm font-medium text-gray-700' }, col)
                  )
                )
              ),
              React.createElement('tbody', {},
                rows.map((row, i) =>
                  React.createElement('tr', { key: i, className: 'border-b hover:bg-gray-50' },
                    columns.map(col =>
                      React.createElement('td', { key: col, className: 'px-6 py-3 text-sm text-gray-900 max-w-xs truncate' },
                        JSON.stringify(row[col] || '')
                      )
                    )
                  )
                )
              )
            )
          )
        )
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
