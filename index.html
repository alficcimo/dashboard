<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Content Farm — Dashboard v1.7.0</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { margin-bottom: 30px; font-size: 32px; font-weight: 700; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #334155; }
        .tab-btn {
            padding: 12px 20px; background: none; border: none; color: #94a3b8; cursor: pointer;
            font-size: 14px; font-weight: 500; border-bottom: 3px solid transparent; transition: all 0.2s;
            position: relative;
        }
        .tab-btn:hover { color: #e2e8f0; }
        .tab-btn.active { color: #3b82f6; border-bottom-color: #3b82f6; }
        .tab-btn .новые {
            display: inline-block; background: #ef4444; color: white; padding: 2px 8px;
            border-radius: 4px; font-size: 11px; font-weight: 700; margin-left: 8px;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .filters { margin-bottom: 20px; display: flex; gap: 10px; }
        .filter-btn {
            padding: 8px 16px; background: #1e293b; border: 1px solid #334155; color: #e2e8f0;
            border-radius: 6px; cursor: pointer; transition: all 0.2s; font-size: 13px;
        }
        .filter-btn.active { background: #3b82f6; border-color: #3b82f6; }
        .filter-btn:hover { border-color: #64748b; }
        .items-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 16px;
        }
        .item {
            background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 16px;
            transition: all 0.2s; position: relative;
        }
        .item:hover { border-color: #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
        .item-new-badge {
            position: absolute; top: 12px; right: 12px; background: #ef4444; color: white;
            padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 700;
        }
        .item-date { color: #64748b; font-size: 12px; margin-bottom: 8px; }
        .item-text { color: #e2e8f0; line-height: 1.6; margin-bottom: 8px; word-break: break-word; }
        .item-title { font-weight: 600; font-size: 14px; color: #93c5fd; margin-bottom: 8px; }
        .empty { color: #64748b; padding: 40px; text-align: center; }
        .stats { margin-bottom: 20px; display: flex; gap: 20px; }
        .stat { background: #1e293b; border: 1px solid #334155; padding: 12px 20px; border-radius: 6px; }
        .stat-label { font-size: 12px; color: #64748b; }
        .stat-value { font-size: 24px; font-weight: 700; color: #3b82f6; }
        .loading { text-align: center; padding: 40px; color: #64748b; }
        .error { background: #7f1d1d; border: 1px solid #991b1b; color: #fee2e2; padding: 16px; border-radius: 6px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const Dashboard = () => {
            const [data, setData] = React.useState({
                ideas: [], analyzedIdeas: [], titles: [], captions: [], carousels: [], captionAnalyzer: []
            });
            const [activeTab, setActiveTab] = React.useState('ideas');
            const [showOnlyNew, setShowOnlyNew] = React.useState(true);
            const [loading, setLoading] = React.useState(true);
            const [error, setError] = React.useState('');

            const REPO = 'alficcimo/dashboard';
            const BRANCH = 'main';

            const formatDate = (dateString) => {
                if (!dateString) return 'N/A';
                try {
                    const date = new Date(dateString);
                    const day = String(date.getDate()).padStart(2, '0');
                    const month = String(date.getMonth() + 1).padStart(2, '0');
                    const year = date.getFullYear();
                    return `${day}-${month}-${year}`;
                } catch {
                    return dateString;
                }
            };

            const fetchGitHubFile = async (filename) => {
                try {
                    const url = `https://api.github.com/repos/${REPO}/contents/${filename}?ref=${BRANCH}`;
                    const response = await fetch(url, {
                        headers: {
                            'Accept': 'application/vnd.github.v3.raw'
                        }
                    });
                    if (!response.ok) throw new Error(`Failed to fetch ${filename}`);
                    const content = await response.json();
                    return content || [];
                } catch (err) {
                    console.error(`Error fetching ${filename}:`, err);
                    return [];
                }
            };

            React.useEffect(() => {
                const loadData = async () => {
                    try {
                        setLoading(true);
                        const files = ['ideas.json', 'analyzed.json', 'titles.json', 'captions.json', 'carousels.json', 'caption-analyzer.json'];
                        const [ideas, analyzed, titles, captions, carousels, analyzer] = await Promise.all(
                            files.map(f => fetchGitHubFile(f))
                        );
                        setData({
                            ideas: Array.isArray(ideas) ? ideas : [],
                            analyzedIdeas: Array.isArray(analyzed) ? analyzed : [],
                            titles: Array.isArray(titles) ? titles : [],
                            captions: Array.isArray(captions) ? captions : [],
                            carousels: Array.isArray(carousels) ? carousels : [],
                            captionAnalyzer: Array.isArray(analyzer) ? analyzer : []
                        });
                    } catch (err) {
                        setError(`Failed to load dashboard: ${err.message}`);
                    } finally {
                        setLoading(false);
                    }
                };
                loadData();
            }, []);

            const tabs = [
                { id: 'ideas', label: 'Ideas', data: data.ideas },
                { id: 'analyzed', label: 'Analyzed Ideas', data: data.analyzedIdeas },
                { id: 'titles', label: 'Titles', data: data.titles },
                { id: 'captions', label: 'Captions', data: data.captions },
                { id: 'carousels', label: 'Carousels', data: data.carousels },
                { id: 'analyzer', label: 'Caption Analyzer', data: data.captionAnalyzer }
            ];

            const currentTabData = tabs.find(t => t.id === activeTab)?.data || [];
            const newItems = currentTabData.filter(item => item.новые === true);
            const displayedItems = showOnlyNew ? newItems : currentTabData;

            const renderItem = (item) => {
                const isNew = item.новые === true;
                const date = formatDate(item.date);
                
                let content = '';
                if (activeTab === 'ideas') {
                    // Ideas tab: show only idea text (no virality info)
                    content = item.idea || item.text || '';
                } else if (activeTab === 'titles') {
                    content = item.title || item.text || '';
                } else if (activeTab === 'captions') {
                    content = item.caption || item.text || '';
                } else if (activeTab === 'carousels') {
                    content = item.carousel || item.text || '';
                } else {
                    content = item.text || item.idea || item.title || item.caption || '';
                }

                return (
                    <div key={`${item.date}-${content.substring(0, 20)}`} className="item">
                        {isNew && <div className="item-new-badge">новые</div>}
                        <div className="item-date">{date}</div>
                        {item.title && <div className="item-title">{item.title}</div>}
                        <div className="item-text">{content.substring(0, 500)}{content.length > 500 ? '...' : ''}</div>
                    </div>
                );
            };

            return (
                <div className="container">
                    <h1>📊 Max Content Farm — v1.7.0</h1>
                    
                    {error && <div className="error">{error}</div>}

                    {loading && <div className="loading">⏳ Loading dashboard...</div>}

                    {!loading && (
                        <>
                            <div className="tabs">
                                {tabs.map(tab => {
                                    const itemCount = tab.data.length;
                                    const newCount = tab.data.filter(i => i.новые === true).length;
                                    return (
                                        <button
                                            key={tab.id}
                                            className={`tab-btn ${activeTab === tab.id ? 'active' : ''}`}
                                            onClick={() => setActiveTab(tab.id)}
                                        >
                                            {tab.label}
                                            {newCount > 0 && <span className="новые">{newCount}</span>}
                                        </button>
                                    );
                                })}
                            </div>

                            <div className="stats">
                                <div className="stat">
                                    <div className="stat-label">Total Items</div>
                                    <div className="stat-value">{currentTabData.length}</div>
                                </div>
                                <div className="stat">
                                    <div className="stat-label">New Items (новые)</div>
                                    <div className="stat-value">{newItems.length}</div>
                                </div>
                            </div>

                            <div className="filters">
                                <button
                                    className={`filter-btn ${showOnlyNew ? 'active' : ''}`}
                                    onClick={() => setShowOnlyNew(!showOnlyNew)}
                                >
                                    {showOnlyNew ? '✓ Show Only New' : 'Show All'}
                                </button>
                            </div>

                            {displayedItems.length > 0 ? (
                                <div className="items-grid">
                                    {displayedItems.map(renderItem)}
                                </div>
                            ) : (
                                <div className="empty">
                                    {showOnlyNew && newItems.length === 0
                                        ? 'No new items in this tab'
                                        : 'No items in this tab'}
                                </div>
                            )}
                        </>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
    </script>
</body>
</html>
