    async function pushIdeaToGitHub(newIdea) {
      const apiBase = 'https://api.github.com/repos/' + GITHUB_REPO + '/contents/' + IDEAS_FILE;
      const headers = {
        'Authorization': 'token ' + GITHUB_TOKEN,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      };

      // Fetch current file + SHA (retry once on 409)
      async function tryWrite(retries) {
        const getRes = await fetch(apiBase + '?ref=master', { headers });
        if (!getRes.ok) throw new Error('GitHub read failed: ' + getRes.status);
        const fileData = await getRes.json();
        const current  = JSON.parse(atob(fileData.content.replace(/\n/g, '')));

        // Deduplication: skip if idea already exists (case-insensitive trim)
        const norm = newIdea.idea.trim().toLowerCase();
        if (current.some(r => r.idea.trim().toLowerCase() === norm)) return 'duplicate';

        const merged  = [newIdea, ...current];
        const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(merged, null, 2))));

        const putRes = await fetch(apiBase, {
          method: 'PUT',
          headers,
          body: JSON.stringify({
            message: 'Add idea: ' + newIdea.idea.slice(0, 60),
            content: encoded,
            sha: fileData.sha,
            branch: 'master'
          })
        });

        if (putRes.status === 409 && retries > 0) return tryWrite(retries - 1); // SHA conflict — retry
        if (!putRes.ok) throw new Error('GitHub write failed: ' + putRes.status);
        return 'ok';
      }

      return tryWrite(1);
    }

    // After saving a new idea, write a .pending-analysis flag to GitHub
    // so the Claude cron picks it up immediately (no watcher needed)
    async function setPendingAnalysisFlag(newIdea) {
      const apiBase = 'https://api.github.com/repos/' + GITHUB_REPO + '/contents/.pending-analysis';
      const headers = {
        'Authorization': 'token ' + GITHUB_TOKEN,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      };
      let sha = null;
      try {
        const getRes = await fetch(apiBase + '?ref=master', { headers });
        if (getRes.ok) { const d = await getRes.json(); sha = d.sha; }
      } catch {}
      const payload = JSON.stringify({ idea: newIdea.idea, date: newIdea.date, ts: Date.now() });
      const encoded = btoa(unescape(encodeURIComponent(payload)));
      const body = { message: 'trigger: analysis for new idea', content: encoded, branch: 'master' };
      if (sha) body.sha = sha;
      await fetch(apiBase, { method: 'PUT', headers, body: JSON.stringify(body) });
    }

аботают незаметно, но системно. Защита утра: самое высокодоходное вложение в собственный ресурс."},{"date":"2026-03-24","idea":"Высокостатусный мужчина смотрит не на внешность. Он оценивает три вещи которые большинство женщин даже не замечают","psychology":"Мужчины с реальным статусом давно прошли стадию, где внешность является первичным фильтром. Они ищут психологическую устойчивость, потому что нестабильный партнёр. Это постоянный источник хаоса в жизни, которую они строили годами. Тревожность, манипуляции и эмоциональные качели для них: красные флаги, не романтика.","energy":"Мужчина с ресурсами и целями несёт большую нагрузку. Ему нужен человек рядом, который добавляет энергию, а не отнимает её. Женщина, которая умеет быть в покое, сама знает чего хочет и не требует постоянного подтверждения. Это редкость и именно это ощущается как магнит.","king":"Я замечаю как женщина ведёт себя когда что-то идёт не по плану. Не когда всё хорошо, а в момент стресса, неопределённости, когда я занят и не отвечаю сразу. Это и есть настоящий характер. Именно там принимается решение.","magic_pill":"Перестань демонстрировать себя. Начни демонстрировать устойчивость. Следующий раз когда захочется написать первой или прояснить отношения: подожди. Посмотри что произойдёт.","summary":"Высокостатусный мужчина оценивает не упаковку, а содержание. Прежде всего психологическую зрелость и внутреннюю устойчивость. Энергетически он ищет партнёра который дополняет его жизнь, а не усложняет её. Самое парадоксальное: именно внутренняя независимость женщины создаёт ту притягательность, которую невозможно сыграть."},{"date":"2026-03-24","idea":"3 обычных слова которые выключают мужчину. Женщины говорят их каждый день не понимая что происходит","psychology":"Определённые фразы активируют в мужчине защитную реакцию «контроль/угроза» на уровне рефлекса, не на уровне рассуждений. Это не обиды и не ругательства. Это слова которые сигнализируют мозгу: тебя оценивают, тебя контролируют, тебя используют. Мужчина закрывается не назло. Он закрывается автоматически.","energy":"Когда мужчина чувствует что его слова и действия постоянно оцениваются и используются против него, он перестаёт вкладываться. Не из жестокости, а из самосохранения. Эмоциональное закрытие: не конец чувств, а конец безопасности.","king":"Я замечаю разницу между женщиной которая со мной и женщиной которая меня изучает. Одна создаёт пространство где я хочу открываться. Другая создаёт ощущение, что каждое моё слово будет использовано в будущем споре. С первой я остаюсь. Со второй: нет.","magic_pill":"Вместо «ты всегда» и «ты никогда» попробуй одну неделю говорить только «я чувствую» и «мне нужно». Это не слабость. Это язык на котором мужчины действительно слышат.","summary":"Слова разрушают мужское желание защищать не через их грубость, а через то, что они сигнализируют о недоверии и контроле. Психологический механизм закрытия срабатывает автоматически, лишая отношения тепла и близости. Изменение одного языкового паттерна, с обвинений на чувства, меняет всю динамику быстрее чем любой разговор «о нас»."},{"date":"2026-03-24","idea":"Женщины уходят из нормальных отношений. Это не кризис, а новый социальный феномен который мужчины не видят","psychology":"Современные женщины впервые в истории имеют экономическую независимость и социальное разрешение уйти. Это открывает доступ к ранее подавленному осознанию: отношения где «всё нормально» но нет роста, глубины и настоящего присутствия. Это не отношения, а договорённость о совместном быте.","energy":"«Нормальные» отношения без развития создают специфический вид истощения: не от конфликтов, а от монотонного присутствия без смысла. Женщина чувствует это раньше мужчины, потому что она эмоционально более настроена на качество связи. К тому моменту как мужчина замечает, решение уже принято.","king":"Я никогда не позволяю отношениям «устаканиться». Удобство убивает страсть вернее любого кризиса. Женщина рядом со мной должна чувствовать что я выбираю её. Не однажды, а каждый день. Это требует усилий, но именно это держит.","magic_pill":"Спроси партнёршу сегодня вечером: «Что бы ты хотела что мы делали вместе, но что мы не делаем?» И послушай ответ не для того чтобы возразить, а чтобы понять.","summary":"Уход из нормальных отношений: не каприз и не кризис среднего возраста, а рациональный выбор человека у которого наконец появились другие опции. Психологически это сигнал о том, что эмоциональные потребности в росте и присутствии не закрывались годами. Мужчина который понимает этот механизм, не теряет женщин из «нормальных» отношений."},{"date":"2026-03-24","idea":"Личные границы которые реально работают: не запреты, а декларация о том кто ты есть","psychology":"Большинство людей ставят границы как правила для других: «ты не должен так со мной». Это всегда проигрышная позиция, потому что апеллирует к чужой доброй воле. Настоящая граница: декларация о себе. «Я человек который не остаётся там где меня не уважают». Разница: фундаментальная.","energy":"Жизнь без настоящих границ требует постоянного мониторинга чужого поведения и реагирования на него. Это изматывает. Чёткие внутренние границы наоборот освобождают энергию, потому что ты перестаёшь ждать разрешения жить по своим правилам.","king":"Мои границы не обсуждаются. Они просто есть. Я не объясняю почему я не принимаю звонки после 22:00 или почему я не терплю пассивной агрессии. Люди которые остаются рядом, принимают это как данность. Те кто уходит, сами делают выбор.","magic_pill":"Определи одну ситуацию которая регулярно тебя злит или истощает. Спроси себя: какое правило о себе я должен был ввести давно, чтобы этого не происходило? Введи его сегодня.","summary":"Настоящие границы: не стены против других людей, а чёткое понимание кто ты и как с тобой можно. Переключение с «ты не должен» на «я не остаюсь» меняет всю динамику власти в отношениях. Один осознанный внутренний запрет сильнее тысячи разговоров о том что тебя обижает."},{"date":"2026-03-24","idea":"Умные люди страдают сильнее. Это не слабость, а цена определённой архитектуры мышления","psychology":"Развитый аналитический ум не отключается когда нужно просто прожить момент. Он продолжает искать причины, последствия и паттерны даже в личной боли. Это создаёт страдание в квадрате: само событие плюс бесконечный анализ события. Интеллект который помогает решать задачи становится инструментом самоистязания.","energy":"Умные люди тратят огромный энергетический ресурс на симуляцию будущего: они проигрывают сценарии, готовятся к худшему, обрабатывают то что ещё не случилось. Эта постоянная фоновая работа ума: невидимый, но реальный источник хронического истощения.","king":"Я научился замечать момент когда анализ перестаёт быть полезным и становится жеванием. Это разные вещи. Анализ ведёт к решению. Жевание ведёт только к следующему кругу. Уметь остановить ум. Это навык, который важнее любого IQ.","magic_pill":"Установи себе лимит: 10 минут на обдумывание проблемы, потом действие или намеренное переключение. Ум нужно учить останавливаться так же как тело учат расслабляться.","summary":"Интеллект: инструмент, и как любой инструмент он может работать против своего владельца. Умные люди страдают сильнее не потому что они слабее, а потому что их ум не умеет выключаться и превращает каждую боль в исследовательский проект. Осознанное ограничение анализа: парадоксально более умное решение, чем попытка проанализировать всё."},{"date":"2026-03-24","idea":"Он исчезает после идеального свидания. Причина не в тебе, а в том что происходит у него внутри в момент настоящей близости","psychology":"Мужчины с избегающим типом привязанности переживают настоящую близость как угрозу. Чем лучше свидание, тем сильнее паника после, потому что хорошее означает зависимость, а зависимость означает уязвимость. Исчезновение: не безразличие, а защитная реакция на то, что было слишком настоящим.","energy":"Настоящая близость требует открытости. А открытость для человека с травмой привязанности ощущается как смертельная опасность. После хорошего свидания такой мужчина буквально «перегревается» и ему нужно дистанцироваться чтобы восстановить ощущение контроля над собой.","king":"Я знаю этот паттерн. Я сам через него прошёл. Момент когда хочется убежать именно потому что стало хорошо. Это не сигнал бежать, а сигнал остановиться и спросить себя: чего я боюсь прямо сейчас? Осознанность здесь меняет всё.","magic_pill":"Если он исчез после хорошего вечера, не пиши первой в течение 5 дней. Не из игры, а потому что ему нужно время переварить собственную реакцию. Если не вернётся. У тебя есть ответ.","summary":"Мужское исчезновение после близости: не загадка и не жестокость, а предсказуемый паттерн избегающей привязанности. Чем лучше было свидание, тем сильнее срабатывает защитный механизм, превращая потенциальную близость в бегство. Понимание этого механизма не делает боль меньше, но убирает ложное чувство что ты сделала что-то не так."}],"titles":[{"date":"2026-03-19","title":"Нейробиологи нашли ЕДИНСТВЕННУЮ причину почему пары охладевают без скандалов (и она у тебя в кармане):"},{"date":"2026-03-19","title":"Есть конкретный процесс в мозге который запускается при каждом скролле рядом с партнёром. Никто об этом не предупреждает:"},{"date":"2026-03-19","title":"Они сидели рядом три часа. Каждый в телефоне. То что разрушилось за эти три часа не вернуть никаким разговором:"},{"date":"2026-03-19","title":"Есть ТОЧНЫЙ момент когда близость в паре начинает умирать. Большинство пропускает его потому что он выглядит невинно:"},{"date":"2026-03-19","title":"Я убрал телефон из спальни два года назад. Она сказала одну фразу через неделю которую я запомнил навсегда:"},{"date":"2026-03-19","title":"Есть одна вещь которую высокостатусный мужчина НИКОГДА не делает рядом с женщиной которую уважает (и это не про деньги):"},{"date":"2026-03-19","title":"Пара ввела одно правило про телефон. Через 9 дней он сказал ей то чего не говорил 4 года:"},{"date":"2026-03-19","title":"3 вещи которые происходят в пар чувствах (это работает):","improved_title":"Одно простое правило про телефон изменит качество отношений быстрее чем ГОДЫ разговоров о чувствах (это работает):","issues_found":"Слабый психологический крючок","virality_after":88,"changes_made":"Форматирование улучшено. Вирусность 88"}],"captions":[{"date":"2026-03-19","title":"Нейробиологи нашли ЕДИНСТВЕННУЮ причину почему пары охладевают без скандалов (и она у тебя в кармане):","caption":"В мозге есть система которая отвечает за чувство единства. Эта система активируется когда два человека в одном пространстве смотрят друг на друга, говорят, касаются. Но есть одна вещь которая моментально эту систему отключает. Телефон. Просто телефон рядом на столе.\n\nНейробиолог из Калифорнии провёл исследование: пара молчит рядом, в одной руке телефон. Активность мозговых центров которые отвечают за привязанность упала на 40 процентов. Они в одной комнате, но их нервные системы в разных мирах.\n\nОх странно что происходит потом. Мозг начинает искать угрозу. Если партнёр отвлёкся на экран, может быть есть что-то важнее меня? Может быть я потерял его? И включается древняя программа: либо борьба, либо бегство.\n\nБольшинство пар не понимают почему они охладели. Они говорят 'мы просто выросли в разные стороны'. На самом деле их нервные системы разучились синхронизироваться. Каждый вечер рядом с телефоном они потихоньку теряют друг друга.\n\nРешение не в разговорах. Попытка поговорить когда мозги уже рассинхронизированы это как пытаться завести машину на пустом бензобаке. Нужно сначала вернуть синхронизацию. Убрать одну вещь.\n\n🔴 Сколько часов в день твой партнёр смотрит в телефон когда вы рядом? Честный ответ это диагноз вашей пары 💜\n\n✨ Если ты готова вернуть синхронизацию с партнёром и почувствовать опять что значит быть единым, смотри разбор про детокс пары в закрытом тг канале, ссылка в шапке 🌹"},{"date":"2026-03-19","title":"Есть конкретный процесс в мозге который запускается при каждом скролле рядом с партнёром. Никто об этом не предупреждает:","caption":"Когда партнёр скроллит рядом с тобой, в его мозге запускается система вознаграждения. Каждый новый пост, каждый лайк, каждый комментарий это микродоза дофамина. Это как маленький укол героина каждые две секунды. И его мозг начинает требовать следующей дозы.\n\nТвой мозг видит это. Твоя нервная система кодирует это как отвержение. Он выбрал коротких видео вместо тебя. И в ответ твой организм начинает выделять кортизол, гормон стресса. Ты сидишь рядом но физиологически ты в режиме боевой готовности.\n\nПовторяется это каждый день. Его система вознаграждения привязывается к экрану, твоя система отвержения привязывается к его отсутствию. Через месяц вы уже в разных состояниях постоянно. Он в беспокойстве от зависимости, ты в обиде от игнора.\n\nЖенщины часто пытаются конкурировать с телефоном: становятся красивей, наряжаются, говорят смешнее. Но это игра где они не могут выиграть. Потому что телефон это не конкурент, это наркотик. И конкурировать с наркотиком невозможно.\n\nИстинное решение это создать такое пространство где телефон физически не может быть. Не потому что запретить. А потому что когда нервные системы синхронизируются без помех, партнёр сам не захочет туда возвращаться.\n\n🔴 Ты уже смирилась с тем что ты вторая в приоритетах после экрана или ты ещё готова на эксперимент? 💜\n\n✨ Если ты хочешь разобраться как вернуть мозг партнёра из его телефона и синхронизировать ваши системы, смотри полный разбор в закрытом тг канале, ссылка в шапке 🌹"},{"date":"2026-03-19","title":"Они сидели рядом три часа. Каждый в телефоне. То что разрушилось за эти три часа не вернуть никаким разговором:","caption":"Три часа рядом. Её сердцебиение нормальное, его окей. Никто не кричит, никто не обижается. На поверхности всё спокойно. Но глубже в организме происходит молчаливое разрушение. Их нервные системы разучиваются друг друга читать.\n\nНа восьмой минуте его телефон вспыхнул. Он улыбнулся экрану. Её мозг это зарегистрировал как личное отвержение. На двадцать четвёртой минуте она включила свой. Компенсация, защита. Они сидят в одном пространстве но в разных измерениях.\n\nНас учили что отношения разрушаются от скандалов. Это неправда. Скандалы это крик отчаяния системы которая ещё борется за контакт. Отношения разрушаются в тишине. Когда оба смирились. Когда сидят рядом но потеряли друг друга.\n\nТри часа молчаливого одиночества рядом это больше чем три ссоры. Потому что ссора это попытка быть услышанным. Молчание рядом это сигнал что услышанным уже не хочет быть никто. Это сдача без боя.\n\nМозг запоминает это. После трёх часов такого молчания вы оба становитесь чуть холоднее. Вы оба переносите чуть дальше границу своего личного пространства. За неделю таких вечеров расстояние может стать непреодолимым.\n\n🔴 Сколько часов в неделю вы проводите рядом но в разных реальностях? Будь честна с собой 💜\n\n✨ Если ты готова вернуть способность быть рядом и действительно вместе, смотри протокол синхронизации пар в закрытом тг канале, ссылка в шапке 🌹"},{"date":"2026-03-19","title":"Есть ТОЧНЫЙ момент когда близость в паре начинает умирать. Большинство пропускает его потому что он выглядит невинно:","caption":"Момент приходит не громко. Он выглядит совершенно невинно. Она только что сказала ему что-то. Он услышал но не ответил. Или ответил но не посмотрел в глаза. Или посмотрел но это был пустой взгляд. Вот этот момент. Момент когда один человек попросил контакта и другой дал отказ.\n\nПервый раз после этого момента её мозг активирует программу тревоги. Её нервная система повышает чувствительность. Она начинает искать признаки отвержения. И находит их везде. Потому что ищет. Её организм готовится к потере.\n\nВторой раз он повторяет отказ контакта. Её система начинает укрепляться. Строить стены. Защищаться. И тогда она делает то же самое ему. Отказывает ему в контакте. Он это чувствует. И строит стены тоже.\n\nЭтот процесс называется десинхронизацией. Пара начинает расстраиваться в своих ритмах. Когда один готов к контакту, другой уже закрыт. Когда второй попытается подойти, первый уже защищён. Они ходят мимо друг друга совсем как незнакомцы.\n\nЛюдям кажется что смерть пары это кульминация. На самом деле кульминация это финал фильма. А фильм начался в момент когда один попросил и получил пустой ответ. И никто не заметил что всё начало падать.\n\n🔴 Когда ты в последний раз попросила внимание и получила пустой ответ? И когда после этого ты сама начала давать пустые ответы? 💜\n\n✨ Если ты хочешь понять как вернуть синхронизацию до того как стены станут непреодолимыми, смотри разбор про критические моменты в паре в тг, ссылка в шапке 🌹"},{"date":"2026-03-19","title":"Я убрал телефон из спальни два года назад. Она сказала одну фразу через неделю которую я запомнил навсегда:","caption":"Неделя в спальне без телефонов. Первые ночи было странно. Привычка тянула руку к прикроватному столику. Привычка искала свет экрана. Но мозг начинал расслабляться. Нервная система медленно выходила из режима боевой готовности.\n\nЧерез три дня она проснулась посередине ночи и посмотрела на него просто так. Без причины. Просто посмотрела. Он проснулся. Они посмотрели друг на друга в темноте пятнадцать минут. Никаких слов. Потом уснули.\n\nЧерез неделю она обняла его с утра и сказала одну фразу которая стала для него точкой опоры на два года вперёд. Она сказала: 'Я забыла что это было'. Забыла что такое чувствовать его, когда нет никакого шума между нами.\n\nВот это вот. Две нервные системы которые синхронизировались когда шум исчез. Две системы которые начали помнить друг друга. Начали опять ощущать дыхание, сердцебиение, энергию. То что техника отключила, молчание вернуло.\n\nОн не просил её полюбить его заново. Он не пытался ничего исправить разговорами. Он просто убрал помеху. И всё остальное произошло само. Потому что близость это не выбор, это физиология. Когда системы синхронизируются, они просто влюбляются друг в друга заново.\n\n🔴 Готова ли ты просто убрать помеху и посмотреть что произойдёт? Или ты ищешь сложное решение для простой проблемы? 💜\n\n✨ Если ты хочешь попробовать эксперимент телефонного детокса и вернуть способность чувствовать партнёра, смотри полный протокол в закрытом тг канале, ссылка в шапке 🌹"},{"date":"2026-03-19","title":"Есть одна вещь которую высокостатусный мужчина НИКОГДА не делает рядом с женщиной которую уважает (и это не про деньги):","caption":"Высокостатусный мужчина не смотрит в телефон когда с ней разговаривает. Не потому что у него есть правило. Потому что его система внимания иначе устроена. Он был выбран жизнью быть внимательным. Внимание это его основной инструмент власти.\n\nВысокостатусный мужчина смотрит ей в глаза когда она говорит и видит не только слова. Видит микровыражения, напряжение в уголках рта, колебание голоса. Видит то что она сама о себе не знает. Это информация. Это власть. И он её берёт через прямой контакт.\n\nМужчина который прячет внимание в телефон это мужчина который не уверен в том что он видит. Он ищет подтверждение в ленте. Он ищет валидацию в лайках. Его внимание рассеяно потому что его система неустойчива. Он девочка по сути, не мужчина.\n\nЖенщина которую уважает высокостатусный это женщина которая требует полный спектр его внимания. Требует чтобы он видел её. И он даёт это потому что это стоит его времени. Его время это его ресурс. И ресурс он дарует выбранной.\n\nОй это меняет всё. Когда мужчина смотрит на тебя без экрана между вами, твоё тело это чувствует. Твоя система активируется. Ты начинаешь светиться. Ты начинаешь становиться притягательнее. А он видит этот результат и уважает тебя ещё больше.\n\n🔴 Какой у твоего мужчины уровень статуса если он не может удержать внимание на одной женщине дольше пяти минут без экрана? 💜\n\n✨ Если ты хочешь привлекать мужчин которые смотрят только на тебя и видят больше чем ты видишь сама, смотри разбор про критерии мужского статуса в тг, ссылка в шапке 🌹"},{"date":"2026-03-19","title":"Пара ввела одно правило про телефон. Через 9 дней он сказал ей то чего не говорил 4 года:","caption":"Правило простое: после шести часов вечера телефон в другой комнате. Просто в другой комнате. Не выключенный, не в самолёте, просто вдалеке. Он согласился потому что смотрел на неё и видел что она на краю. Видел что потеря отношений уже начиналась.\n\nПервые два дня было мучительно. Его руки сами тянулись. Его внимание искало куда-то спрятаться. Но на третий день его нервная система начала выходить из режима зависимости. На четвёртый день они впервые за год просто посидели рядом и разговаривали.\n\nНа девятый день вечером он её поцеловал и сказал фразу которую она ждала четыре года: 'Я люблю тебя'. Не в смысле что он разлюбил и потом снова полюбил. В смысле что заново её увидел. Что вспомнил почему она важна.\n\nО что произошло за девять дней? Его мозг избавился от постоянной микростимуляции. Его система дофамина нормализовалась. И тогда он смог почувствовать её. Реальную, живую, рядом сидящую. И любовь это не чувство, это восприятие. Когда видишь, то чувствуешь.\n\nНеверно думать что время лечит. Время убивает если оно наполнено теми же действиями. Но девять дней без помех это девять дней пересинхронизации. Это девять дней напоминания об том зачем вы друг другу нужны.\n\n🔴 Готова ли ты на девятидневный эксперимент зная что девятый день может всё вернуть? Или страх потери сильнее чем надежда на возвращение? 💜\n\n✨ Если ты хочешь ввести это правило и вернуть своего партнёра к себе, смотри пошаговый протокол в закрытом тг канале, ссылка в шапке 🌹"},{"date":"2026-03-19","title":"3 вещи которые происходят в паре когда телефоны исчезают за час до сна. Третья меня ПОРАЗИЛА больше всего:","caption":"Первое: физиологически тело начинает готовиться к сну. Уровень кортизола падает, выделяется мелатонин. Когда телефона нет, нет и цикла стресс-вознаграждение. Мозг расслабляется. Это базовая биология.\n\nВторое: женщина начинает чувствовать себя безопасно. Её партнёр не отвлекается. Его внимание на ней. Её нервная система регистрирует это как безопасность и она расслабляется тоже. Нет режима боевой готовности перед сном. Нет стресса который переносится в ночные кошмары.\n\nТретье и самое странное: они начинают разговаривать. По-настоящему. О вещах которые забыли обсуждать. О мечтах. О страхах. О том что их волнует. Потому что нет помех. Потому что нервные системы работают в режиме открытости, не в режиме защиты.\n\nВещи которые нельзя обсудить за час с телефоном в руке, обсуждаются за пятнадцать минут когда телефона нет. Потому что общение это не количество времени, это качество синхронизации. Две открытые системы общаются быстро и честно.\n\nПар которые убрали телефоны за час до сна начинают спать лучше, разговаривают открытей, и просыпаются более счастливыми. Это не совпадение. Это физиология. Час без помех переносит вас в другое состояние сознания.\n\n🔴 Твой партнёр знает хотя бы одну твою самую глубокую мечту которая родилась за последний месяц? Или все мечты остаются в твоей голове потому что нет пространства поделиться? 💜\n\n✨ Если ты хочешь вернуть глубокие разговоры и восстановить эмоциональную близость, смотри разбор про вечерний ритуал пары в закрытом тг канале, ссылка в шапке 🌹"},{"date":"2026-03-19","title":"Самое РАЗРУШИТЕЛЬНОЕ для отношений происходит не в момент ссоры. Оно происходит в тишине когда всё как будто хорошо:","caption":"Ссора это крик системы что помощь нужна. Ссора это попытка быть услышанным. Ссора это ещё боевое состояние. Но тишина. Тишина когда оба смирились и перестали ждать ответа. Тишина это уже смерть.\n\nОна пришла домой, поздоровалась, он кивнул не отрываясь от экрана. Она почувствовала отказ. Завтра она не будет особо говорить. Он заметит изменение тона, но вместо того чтобы спросить, он тоже уйдёт в телефон. Синхронизация разорвалась.\n\nДень за днём в тишине. На поверхности кажется что всё хорошо. Они едят вместе, спят в одной кровати, говорят 'пока' перед работой. Но на нейробиологическом уровне они уже давно развелись. Их системы разучились друг друга читать.\n\nО когда наконец вспыхивает конфликт, люди думают что ссора разрушила отношения. На самом деле ссора это только озвучение того разрушения которое происходило в тишине. Ссора это просто вывод того что уже давно интегрировалось в организм обоих.\n\nРазвал начинается не со скандала. Развал начинается с первого момента когда один попросил и не получил. С первого момента когда дали пустой ответ. И если этот момент не остановить сразу, система включает режим медленной смерти. Смерти в тишине.\n\n🔴 Сколько дней уже длится твоя тишина? Один месяц? Полгода? Всё это время отношения умирали тихо и ты этого даже не замечала? 💜\n\n✨ Если ты готова разбить эту тишину и вернуть контакт, смотри протокол восстановления синхронизации в закрытом тг канале, ссылка в шапке 🌹"},{"date":"2026-03-19","title":"Семейные терапевты видят ОДНУ и ту же вещь у пар которые расходятся спокойно (и это не про измену и не про деньги):","caption":"Пара сидит в офисе терапевта и рассказывает что они просто выросли в разные стороны. Что перестали понимать друг друга. Что нет уже ничего общего. Это звучит как две отдельные истории. Две разные реальности.\n\nТерапевт задаёт вопрос: 'Когда вы в последний раз были вместе настоящим образом? Когда вы последний раз смотрели друг в друга без помех?' И тишина. Потому что они не помнят. Потому что это было давно. Потому что телефоны заполнили это пространство.\n\nТерапевт видит это каждый день. Не пары которые ссорятся. Ссоры легче лечить. Терапевт видит пары которые потеряли синхронизацию без каких-либо громких причин. Просто потеряли способность чувствовать друг друга.\n\nИ вот странная вещь. Когда пары воссоздают контакт хотя бы на несколько дней, всё меняется. Не потому что они разговорили проблемы. Проблем нет. Проблема в отсутствии синхронизации. И когда синхронизация возвращается, проблемы просто исчезают.\n\nТо что называется 'выросли в разные стороны' это на самом деле 'потеряли контакт и каждый начал додумывать кто такой другой'. Две одинокие системы которые живут в одном доме. И всё потому что забыли смотреть друг на друга.\n\n🔴 Ты выросла в другую сторону или ты просто забыла как выглядит твой партнёр когда он на тебя смотрит без экрана? 💜\n\n✨ Если ты готова разобраться где закончился контакт и начало ваш развал, смотри диагностику отношений в закрытом тг канале, ссылка в шапке 🌹"}],"carousels":[{"title":"Нейробиологи нашли ЕДИНСТВЕННУЮ причину почему пары охладевают без скандалов (и она у тебя в кармане):","carousel":"Учёные потратили годы изучая почему пары перестают чувствовать близость. Без измен, без предательства, без скандалов. Ответ оказался в среднем 4 часа в день у каждого в руках.\n\nАнтон и Марина вместе 6 лет. Хороший брак по всем меркам. Не ругаются. Не изменяют. Просто каждый вечер лежат рядом, каждый в своём экране. Марина думает: «Мы просто устаём». Нейробиологи думают иначе.\n\nКаждый раз когда ты достаёшь телефон рядом с партнёром, мозг получает сигнал: этот человек менее важен чем то что там. Тысяча таких моментов за год. Нейронные пути перестраиваются. Партнёр постепенно перемещается в категорию фон.\n\nЧерез три года Антон понимает что не знает о чём думает Марина. Она давно перестала рассказывать. Не потому что скрывает. Просто однажды рассказывала, а он смотрел в телефон. И потом ещё раз. И ещё.\n\nСейчас они ходят к терапевту. Терапевт задал один вопрос: «Когда вы последний раз смотрели друг другу в глаза больше минуты?» Молчание длилось очень долго.\n\nКак остановить этот процесс если он уже запущен? Полный разбор в закрытом тг-канале, ссылка в шапке профиля.","caption_under":"📍Забирай разбор «Цифровая близость: как вернуть настоящий контакт с партнёром» в моём закрытом тг-канале, ссылка в шапке профиля."},{"title":"Есть конкретный процесс в мозге который запускается при каждом скролле рядом с партнёром. Никто об этом не предупреждает:","carousel":"Каждый раз когда ты скроллишь ленту рядом с любимым человеком, в мозге запускается реакция. Не злобная. Не осознанная. Просто биохимия которая медленно переписывает как ты воспринимаешь человека рядом.\n\nДофамин это не просто гормон радости. Это навигатор. Он запоминает где было хорошо и тянет туда снова. Лента даёт дофамин предсказуемо, быстро, без усилий. Партнёр требует внимания, разговора, присутствия. Мозг делает выводы.\n\nКатя заметила это через полгода после свадьбы. Артём не стал хуже. Просто его присутствие рядом перестало вызывать тепло. Раньше вызывало. Она думала что разлюбила. На самом деле мозг просто переключил источник дофамина.\n\nНейробиолог Анна Лемке называет это дофаминовым дрейфом. Ты не предаёшь партнёра. Ты просто натренировал мозг получать удовольствие в другом месте. И теперь рядом с ним тебе скучно. Хотя год назад было иначе.\n\nКатя убрала телефон из их вечеров на две недели. На третий день почувствовала то что думала потеряла навсегда. Артём не изменился. Изменился источник её дофамина.\n\nТы помнишь как чувствовал себя рядом с этим человеком в самом начале? Это всё ещё возможно вернуть. Как именно — в закрытом тг-канале, ссылка в шапке профиля.","caption_under":"📍Разбор «Дофаминовый детокс для пар: как перезапустить влечение без терапии» в моём закрытом тг-канале, ссылка в шапке профиля."},{"title":"Они сидели рядом три часа. Каждый в телефоне. То что разрушилось за эти три часа не вернуть никаким разговором:","carousel":"Три часа рядом. Каждый в своём экране. Кажется ничего не произошло. Не поругались. Не сказали ничего обидного. Но то что тихо сломалось в эти три часа не починить ни одним разговором.\n\nИгорь и Света. Суббота, диван, сериал на фоне. Оба в телефонах. Он смотрит матчи, она листает Instagram. Три часа абсолютного вместе и абсолютного поодиночке одновременно.\n\nМозг не различает физическое и эмоциональное присутствие. Три часа рядом с человеком который выбрал экран вместо тебя это три часа сигнала «ты не главный». Тело это фиксирует даже когда разум отрицает.\n\nСледующим вечером Света заметила что не хочет рассказывать Игорю про разговор с подругой. Раньше рассказывала всё. Просто что-то внутри закрылось. Тихо. Без объяснений.\n\nЧерез полгода таких суббот Игорь спросил почему они больше не разговаривают. Света не знала что ответить. Она и сама не заметила когда именно перестала.\n\nКогда близость уходит тихо и без ссор, момент когда это можно остановить очень короткий. Что делать прямо сейчас — в закрытом тг-канале, ссылка в шапке профиля.","caption_under":"📍Забирай разбор «Тихий развод: как распознать его за год до того как он случится» в моём закрытом тг-канале, ссылка в шапке профиля."},{"title":"Есть ТОЧНЫЙ момент когда близость в паре начинает умирать. Большинство пропускает его потому что он выглядит невинно:","carousel":"Есть один конкретный момент с которого начинается медленная смерть близости. Его пропускают почти все потому что он выглядит абсолютно нормально. Даже безобидно.\n\nОна рассказывает о чём-то важном. Он слушает. Потом достаёт телефон. Одним движением. Автоматически. Продолжает кивать. Она видит этот жест и внутри что-то регистрирует: я менее интересна чем уведомление.\n\nЭто не про грубость. Это про привычку. Но мозг партнёра не делает этого различия. Каждый такой момент это маленькое голосование. И результаты накапливаются. Через месяц она рассказывает меньше. Через три — только самое необходимое.\n\nПсихолог Джон Готтман называет это отвержением попытки контакта. Человек тянется к тебе, ты выбираешь телефон. Достаточно 30% таких моментов чтобы партнёр перестал тянуться совсем.\n\nМаксим понял это когда жена перестала делиться новостями с работы. «Ты же всегда в телефоне пока я говорю» — сказала она. Он не помнил ни одного такого случая. Она помнила каждый.\n\nСколько раз за последнюю неделю ты выбрал экран в момент когда партнёр тянулся к тебе? Чек-лист и разбор — в закрытом тг-канале, ссылка в шапке профиля.","caption_under":"📍Получи чек-лист «10 невидимых жестов которые убивают близость» в моём закрытом тг-канале, ссылка в шапке профиля."},{"title":"Я убрал телефон из спальни два года назад. Она сказала одну фразу через неделю которую я запомнил навсегда:","carousel":"Два года назад я убрал телефон из нашей спальни. Не потому что читал об этом. Просто понял что последнее что вижу перед сном и первое после пробуждения это экран, а не человек рядом со мной.\n\nПервые три дня были некомфортными. Рука машинально тянулась к тумбочке. Мозг придумывал причины почему телефон должен быть рядом. Будильник. Срочные сообщения. Что если что-то случится.\n\nНа четвёртый день мы разговаривали в темноте полтора часа. Просто так. О ерунде, о детстве, о том что давно хотели сказать но не было момента. Я не помнил когда мы последний раз разговаривали вот так, без цели, просто потому что приятно.\n\nНа седьмой день она повернулась и сказала одну фразу. Я не буду её здесь писать. Но я понял что потерял эту версию наших отношений на несколько лет. И вернул её за одну неделю одним простым решением.\n\nДва года спустя телефон до сих пор не ночует в спальне. Это стало нашим негласным договором. Пространство где мы снова умеем быть вдвоём.\n\nЧто мешает тебе попробовать это прямо сегодня ночью? 7-дневный протокол — в закрытом тг-канале, ссылка в шапке профиля.","caption_under":"📍Забирай разбор «Спальня без телефона: 7-дневный протокол возврата близости» в моём закрытом тг-канале, ссылка в шапке профиля."},{"title":"Есть одна вещь которую высокостатусный мужчина НИКОГДА не делает рядом с женщиной которую уважает (и это не про деньги):","carousel":"Статус мужчины в отношениях определяется не тем сколько он зарабатывает. И не внешностью. Есть один конкретный поведенческий маркер который женщина считывает мгновенно и который говорит ей всё что нужно знать.\n\nАлексей зарабатывает очень хорошо. Ездит на дорогой машине. Выглядит безупречно. Но каждый раз на ужине с Аней он кладёт телефон экраном вверх на стол. И каждый раз когда приходит уведомление смотрит. Аня замечает. Каждый раз.\n\nЖенский мозг эволюционно заточен на оценку приоритетов партнёра. Когда мужчина отвлекается на телефон в её присутствии, сигнал однозначный: там важнее чем здесь. Это не обида. Это базовая оценка уважения.\n\nМужчина с настоящим внутренним авторитетом управляет своим вниманием. Он не раб уведомлений. Когда он с тобой — он с тобой. Это редкость. И именно поэтому рядом с таким человеком женщина чувствует себя по-настоящему важной.\n\nАня перенесла следующий ужин. «Занята» — написала. На самом деле просто устала конкурировать с его телефоном за внимание. Алексей так и не понял почему.\n\nСколько раз за последний месяц ты брал телефон когда рядом был человек которому хочешь быть важным? Разбор мужского присутствия — в закрытом тг-канале, ссылка в шапке профиля.","caption_under":"📍Разбор «Мужское присутствие: как стать человеком рядом с которым хочется быть» в моём закрытом тг-канале, ссылка в шапке профиля."},{"title":"Пара ввела одно правило про телефон. Через 9 дней он сказал ей то чего не говорил 4 года:","carousel":"Они не шли к терапевту. Не читали книги по отношениям. Просто однажды вечером договорились об одном простом правиле. Через девять дней он произнёс фразу которую не говорил четыре года.\n\nПравило было элементарным: после 21:00 телефоны уходят в другую комнату. Оба. Без исключений. Никита и Даша решили попробовать на две недели просто из любопытства.\n\nПервые два дня было странно. Паузы в разговоре ощущались неловко. Они привыкли заполнять тишину скроллингом. Без телефонов тишина требовала либо говорить, либо просто быть рядом. Оба варианта оказались сложнее чем ожидали.\n\nНа пятый день Даша рассказала про страх которого никогда не озвучивала. Просто так, в темноте, без повода. Никита слушал по-настоящему, не ожидая уведомлений. Это был другой разговор. Другой уровень.\n\nНа девятый день утром Никита обнял её и сказал три слова которые не произносил с тех пор когда они только встречались. Не потому что специально готовился. Просто наконец почувствовал их снова.\n\nЧто произошло бы в твоих отношениях если убрать телефоны на девять вечеров? Пошаговый протокол — в закрытом тг-канале, ссылка в шапке профиля.","caption_under":"📍Забирай протокол «9 вечеров без телефона: пошаговый план для пар» в моём закрытом тг-канале, ссылка в шапке профиля."},{"title":"3 вещи которые происходят в паре когда телефоны исчезают за час до сна. Третья меня ПОРАЗИЛА больше всего:","carousel":"Когда убираешь телефоны за час до сна происходят три вещи. Первые две предсказуемые. Третья поразила меня настолько что я начал рекомендовать это всем кто жалуется на ощущение одиночества в отношениях.\n\nПервое: вы начинаете говорить. Не «как дела» и «что на ужин». А настоящие разговоры. Про то что беспокоит, про смешное из прошлого, про то что хочется но никогда не было момента сказать. Тишина без телефона требует заполнения и вы заполняете её друг другом.\n\nВторое: близость возвращается физически. Это не романтическое преувеличение. Синий свет экрана подавляет окситоцин. Убираешь экран — тело вспоминает что рядом живой человек. Пары которые ввели это правило отмечают изменения уже через первую неделю.\n\nТретье. Вот что меня поразило. Через две недели оба партнёра независимо друг от друга сказали одно и то же: «Я перестал чувствовать тревогу перед сном». Не потому что телефон был источником тревоги. А потому что близость с живым человеком оказалась лучшим успокоением чем любая лента.\n\nДима и Лера ввели это правило три месяца назад. Лера говорит: «Я снова жду вечера. Как в начале отношений. Я забыла что это возможно».\n\nКакую из этих трёх вещей тебе больше всего не хватает прямо сейчас? Полный протокол на 14 дней — в закрытом тг-канале, ссылка в шапке профиля.","caption_under":"📍Получи полный протокол «Час без экрана: как изменить отношения за 14 дней» в моём закрытом тг-канале, ссылка в шапке профиля."},{"title":"Самое РАЗРУШИТЕЛЬНОЕ для отношений происходит не в момент ссоры. Оно происходит в тишине когда всё как будто хорошо:","carousel":"Все боятся скандалов. Никто не боится тишины. А именно в тишине, когда всё нормально, происходит самое разрушительное для отношений что только существует.\n\nОлег и Таня не ссорятся. За последний год ни одного серьёзного конфликта. Друзья завидуют. «Идеальная пара». Но каждый вечер они сидят в одной комнате и каждый в своём мире. Без злобы. Просто каждый отдельно.\n\nПсихологи называют это параллельным существованием. Это не кризис. Это хуже кризиса. В кризисе ещё есть энергия: злость, боль, желание что-то изменить. В параллельном существовании нет ничего. Просто два человека которые привыкли быть рядом и перестали быть вместе.\n\nТаня поняла это когда поймала себя на мысли что интереснее рассказывает подруге чем мужу. Не потому что подруга лучше. Просто подруга слушает. А Олег рядом. Но его нет.\n\nТерапевты говорят что пары которые расходятся без скандалов разошлись не в момент развода. Они разошлись в тысяче тихих вечеров когда каждый был в телефоне и думал что всё в порядке.\n\nВ твоих отношениях сейчас тишина потому что хорошо или потому что уже всё равно? Как выйти из параллельного существования — в закрытом тг-канале, ссылка в шапке профиля.","caption_under":"📍Разбор «Параллельное существование: как выйти из него до того как стало поздно» в моём закрытом тг-канале, ссылка в шапке профиля."},{"title":"Семейные терапевты видят ОДНУ и ту же вещь у пар которые расходятся спокойно (и это не про измену и не про деньги):","carousel":"Семейные терапевты работают с тысячами пар. И те кто расходятся без скандалов, без измен, без очевидной причины — все они приходят с одной и той же картиной. Одной. Повторяющейся. Каждый раз.\n\nНе измена. Не финансы. Не характер. Терапевты видят двух людей которые разучились присутствовать рядом друг с другом. Физически они вместе годами. Эмоционально разошлись в тот вечер когда первый раз выбрали телефон вместо разговора. И не заметили этого.\n\nЛюдмила Петрановская описывает это как эрозию привязанности. Не взрыв. Не предательство. Просто каждый день чуть меньше контакта. Чуть меньше взглядов. Чуть меньше прикосновений. Пока однажды не остаётся привычка жить рядом и ничего больше.\n\nСергей и Ирина пришли к терапевту через 14 лет брака. «Мы просто стали чужими» — сказал Сергей. Терапевт спросила: «Когда вы последний раз разговаривали без телефонов рядом?» Они не смогли вспомнить.\n\nСамое страшное в этой картине не развод. Самое страшное что большинство пар живёт в этом состоянии годами, называет это стабильностью и не знает что можно иначе.\n\nТы в стабильных отношениях или в отношениях которые тихо стали привычкой? Диагностика и протокол восстановления — в закрытом тг-канале, ссылка в шапке профиля.","caption_under":"📍Забирай разбор «Эрозия привязанности: диагностика и протокол восстановления» в моём закрытом тг-канале, ссылка в шапке профиля."}],"feed":[{"date":"2026-03-24","title":"Никогда не отвечай на эти 3 вопроса","views":692500},{"date":"2026-03-24","title":"Поздравляю, вы выиграли! Только не верьте ни слову","views":1900000},{"date":"2026-03-24","title":"Just watched","views":777},{"date":"2026-03-24","title":"No overlay text","views":365},{"date":"2026-03-24","title":"No overlay text","views":691},{"date":"2026-03-24","title":"Уникален идея для Apple Watch","views":308},{"date":"2026-03-24","title":"Увидел название скрытой группы в ее телефоне и молча забрал ключи от машины (Охранник паркинга видел эксцес)","views":526},{"date":"2026-03-24","title":"Муж увидел уведомление на ее телефоне и молча заблокировал все карты (Официант рассказал что случилось)","views":2153},{"date":"2026-03-24","title":"Прочитал всплывающее окно на об iPad и молча внупировал ее визу (Ассистент видел текст):","views":282},{"date":"2026-03-24","title":"Услышал ее голосовое подтруб из его машины и молча отменил покупку дома (Водитель рассказал, что там было):","views":13900}],"improver":[]};

    const TABS = [
      { id: 'ideas',          label: 'Ideas',          file: 'content-ideas.json' },
      { id: 'analyzed',       label: 'Analyzed',       file: 'content-analyzed.json' },
      { id: 'titles',         label: 'Titles',         file: 'content-titles.json' },
      { id: 'captions',       label: 'Captions',       file: 'content-captions.json' },
      { id: 'carousels',      label: 'Carousels',      file: 'content-carousels.json' },
      { id: 'feed',           label: 'Feed Analyzer',  file: 'content-feed.json' },
      { id: 'caption_analyzer', label: 'Caption Analyzer', file: 'content-caption-analysis.json' },
    ];
    
    // Polling interval: configurable via URL parameter (?interval=5000), defaults to 30 seconds
    const DEFAULT_POLL_INTERVAL_MS = 30000;
    const urlParams = new URLSearchParams(window.location.search);
    const POLL_INTERVAL_MS = parseInt(urlParams.get('interval')) || DEFAULT_POLL_INTERVAL_MS;

    async function fetchAllData() {
      const results = {};
      await Promise.all(TABS.map(async tab => {
        try {
          const res = await fetch(tab.file + '?_=' + Date.now());
          if (res.ok) { results[tab.id] = await res.json(); return; }
        } catch {}
        results[tab.id] = EMBEDDED_DATA[tab.id] || [];
      }));
      return results;
    }

    const e = React.createElement;

    function SyncIndicator({ lastSync, polling, pollInterval }) {
      const [elapsed, setElapsed] = React.useState(0);
      React.useEffect(() => {
        if (!lastSync) return;
        const iv = setInterval(() => setElapsed(Math.floor((Date.now() - lastSync) / 1000)), 1000);
        return () => clearInterval(iv);
      }, [lastSync]);
      if (!lastSync) return e('span', {className: 'text-xs text-gray-400'}, polling ? 'Loading...' : 'No connection');
      const color = elapsed < 35 ? 'text-green-600' : elapsed < 70 ? 'text-yellow-600' : 'text-red-500';
      const pollIntervalSeconds = pollInterval ? Math.round(pollInterval / 1000) : 30;
      return e('span', {className: 'text-xs font-medium flex items-center gap-1 ' + color},
        e('span', {className: 'inline-block w-2 h-2 rounded-full bg-current'}),
        elapsed < 5 ? 'Just updated' : 'Updated ' + elapsed + 's ago',
        ' \u00b7 ',
        e('span', {className: 'text-gray-400 font-normal'}, 'auto-refresh every ' + pollIntervalSeconds + 's')
      );
    }

    function TabBar({ activeTab, rowCounts, onTabChange }) {
      return e('div', {className: 'flex border-b border-gray-300 bg-white overflow-x-auto sticky top-0 z-10 shadow-sm'},
        TABS.map(function(tab) {
          const count = rowCounts[tab.id] != null ? rowCounts[tab.id] : 0;
          const isActive = activeTab === tab.id;
          return e('button', {
            key: tab.id,
            onClick: function() { onTabChange(tab.id); },
            className: 'px-4 py-3 text-sm font-medium whitespace-nowrap border-b-2 transition-colors ' +
              (isActive ? 'border-blue-500 text-blue-600 bg-blue-50' : 'border-transparent text-gray-600 hover:text-gray-900 hover:bg-gray-50')
          },
            tab.label,
            count > 0 ? e('span', {
              className: 'ml-2 px-2 py-0.5 rounded-full text-xs font-semibold ' +
                (isActive ? 'bg-blue-100 text-blue-700' : 'bg-gray-200 text-gray-600')
            }, count) : null
          );
        })
      );
    }

    function DropZone({ onLoad, error, setError, wrapperClass }) {
      const inputRef = React.useRef(null);
      const [dragging, setDragging] = React.useState(false);
      function processFile(file) {
        if (!file) return;
        if (file.size > 5*1024*1024) { setError('File too large (max 5MB)'); return; }
        if (!file.name.toLowerCase().endsWith('.json')) { setError('Must be a .json file'); return; }
        const reader = new FileReader();
        reader.onload = ev => {
          try {
            const parsed = JSON.parse(ev.target.result);
            if (!Array.isArray(parsed)) throw new Error('must be array');
            setError(null); onLoad(parsed);
          } catch { setError('Invalid JSON file'); }
        };
        reader.readAsText(file);
      }
      return e('div', {className: wrapperClass || 'px-4 pt-3 pb-1'},
        e('div', {
          onClick: () => inputRef.current && inputRef.current.click(),
          onDragOver: ev => { ev.preventDefault(); setDragging(true); },
          onDragLeave: () => setDragging(false),
          onDrop: ev => { ev.preventDefault(); setDragging(false); processFile(ev.dataTransfer.files[0]); },
          className: 'border-2 border-dashed rounded-lg p-3 text-center cursor-pointer transition-colors ' +
            (dragging ? 'border-blue-400 bg-blue-50' : error ? 'border-red-400 bg-red-50' : 'border-gray-200 bg-white hover:border-blue-300 hover:bg-blue-50')
        },
          error ? e('p', {className: 'text-red-600 text-xs font-medium'}, error)
                : e('p', {className: 'text-gray-400 text-xs'}, dragging ? 'Drop it!' : 'Drop JSON to merge or click to upload'),
          e('input', {ref: inputRef, type: 'file', accept: '.json,.JSON', className: 'hidden',
            onChange: ev => processFile(ev.target.files[0])})
        )
      );
    }

    function DataTable({ tabId, rows, isManual, onClearManual, feedback, setFeedback, onDislike, onLike }) {
      const columns = COLUMN_DEFS[tabId] || [];
      const headerCells = [
        e('th', {key:'#', className:'px-3 py-2 text-left font-semibold text-gray-600 border border-gray-300 bg-gray-100 whitespace-nowrap text-xs'}, '#')
      ].concat(columns.map(col =>
        e('th', {key:col, className:'px-3 py-2 text-left font-semibold text-gray-600 border border-gray-300 bg-gray-100 whitespace-nowrap text-xs'}, col === 'feedback' ? '👍👎' : col)
      ));
      const bodyRows = rows.length === 0
        ? [e('tr', {key:'empty'}, e('td', {colSpan: columns.length+1, className:'px-3 py-8 text-center text-gray-400 text-sm'}, 'No data yet. Run the skill to populate this tab.'))]
        : rows.map((row, i) => {
            const rowKey = JSON.stringify(row);
            const currentFeedback = feedback[rowKey] || null;
            const cells = [
              e('td', {key:'#', className:'px-3 py-2 border border-gray-200 text-gray-400 text-xs select-none'}, i+1)
            ].concat(columns.map(col => {
              if (col === 'feedback') {
                return e('td', {key:col, className:'px-3 py-2 border border-gray-200 align-top'}, 
                  e('div', {className:'flex gap-3'},
                    e('label', {className:'flex items-center gap-1 cursor-pointer'},
                      e('input', {type:'radio', name:'feedback-'+i, value:'like', checked: currentFeedback === 'like',
                        onChange: () => onLike ? onLike(rowKey, row) : setFeedback({...feedback, [rowKey]: 'like'}), className:'cursor-pointer'}),
                      e('span', {className:'text-lg'}, '👍')
                    ),
                    e('label', {className:'flex items-center gap-1 cursor-pointer'},
                      e('input', {type:'radio', name:'feedback-'+i, value:'dislike', checked: currentFeedback === 'dislike',
                        onChange: () => onDislike ? onDislike(rowKey, row) : setFeedback({...feedback, [rowKey]: 'dislike'}), className:'cursor-pointer'}),
                      e('span', {className:'text-lg'}, '👎')
                    )
                  )
                );
              }
              return e('td', {key:col, className:'px-3 py-2 border border-gray-200 text-gray-800 align-top max-w-xs ' +
                (MULTILINE_COLS.has(col) ? 'whitespace-pre-wrap' : 'whitespace-normal')},
                row[col] != null ? row[col] : '')
            }));
            return e('tr', {key:i, className: i%2===0 ? 'bg-white' : 'bg-gray-50'}, cells);
          });
      return e('div', null,
        isManual ? e('div', {className:'px-4 py-1.5 bg-amber-50 border-b border-amber-200 flex items-center justify-between'},
          e('span', {className:'text-xs text-amber-700 font-medium'}, 'Merged: uploaded + live \u2014 ' + rows.length + ' rows'),
          e('button', {onClick: onClearManual, className:'text-xs text-amber-600 hover:text-amber-800 underline'}, 'Remove upload')
        ) : null,
        e('div', {className:'overflow-x-auto'},
          e('table', {className:'min-w-full text-sm border-collapse'},
            e('thead', null, e('tr', null, headerCells)),
            e('tbody', null, bodyRows)
          )
        )
      );
    }

    function mergeRows(uploaded, live) {
      const seen = new Set(live.map(r => JSON.stringify(r)));
      return uploaded.filter(r => !seen.has(JSON.stringify(r))).concat(live);
    }

    function TabPanel({ tabId, liveRows, feedback, setFeedback, onDislike, onLike }) {
      const [merged,     setMerged]     = React.useState(null);
      const [error,      setError]      = React.useState(null);
      const [addingIdea, setAddingIdea] = React.useState(false);
      const [draftIdea,  setDraftIdea]  = React.useState({idea: '', source: ''});
      const [saving,     setSaving]     = React.useState(false); // 'idle'|'saving'|'saved'|'error'
      const manualRef = React.useRef(null);
      const [savedIdeas, setSavedIdeas] = React.useState(() => {
        try { return JSON.parse(localStorage.getItem('manual_ideas') || '[]'); } catch(e) { return []; }
      });
      React.useEffect(() => {
        if (manualRef.current) setMerged(mergeRows(manualRef.current, liveRows));
      }, [liveRows]);
      function handleUpload(up) { manualRef.current = up; setMerged(mergeRows(up, liveRows)); setError(null); }
      function handleClear()    { manualRef.current = null; setMerged(null); setError(null); }
      async function handleSaveIdea() {
        if (!draftIdea.idea.trim() || saving === 'saving') return;
        const today = new Date().toISOString().slice(0, 10);
        const source = draftIdea.source.trim() || 'manual';
        const newIdea = { date: today, idea: draftIdea.idea.trim(), source };

        // 1. Save to localStorage immediately (optimistic)
        const updated = [newIdea, ...savedIdeas];
        setSavedIdeas(updated);
        localStorage.setItem('manual_ideas', JSON.stringify(updated));

        // 2. Push to GitHub so pipeline picks it up
        setSaving('saving');
        try {
          const result = await pushIdeaToGitHub(newIdea);
          if (result === 'ok') {
            // 3. Set .pending-analysis flag so Claude cron triggers analysis
            setPendingAnalysisFlag(newIdea).catch(() => {}); // fire-and-forget
          }
          setSaving('saved');
          setTimeout(() => {
            setSaving('idle');
            setAddingIdea(false);
            setDraftIdea({idea: '', source: ''});
          }, 1200);
        } catch (err) {
          console.error('GitHub push failed:', err);
          setSaving('error');
          setTimeout(() => setSaving('idle'), 3000);
        }
      }
      const baseRows = merged != null ? merged : liveRows;
      const rows     = tabId === 'ideas' ? [...savedIdeas, ...baseRows] : baseRows;
      const isManual = merged != null;
      return e('div', null,
        tabId === 'ideas'
          ? e('div', {className: 'flex items-stretch gap-2 px-4 pt-3 pb-1'},
              e('button', {
                onClick: () => { setAddingIdea(!addingIdea); setDraftIdea({idea: '', source: ''}); },
                className: 'flex-shrink-0 px-3 py-1.5 bg-green-600 text-white text-xs font-semibold rounded-lg hover:bg-green-700 self-center whitespace-nowrap'
              }, '+ Add idea'),
              e(DropZone, {onLoad: handleUpload, error, setError, wrapperClass: 'flex-1'})
            )
          : e(DropZone, {onLoad: handleUpload, error, setError}),
        addingIdea ? e('div', {className: 'px-4 py-2 bg-green-50 border-b border-green-200'},
          e('div', {className: 'flex gap-2 items-center'},
            e('span', {className: 'text-xs text-gray-400 whitespace-nowrap'}, new Date().toISOString().slice(0, 10)),
            e('input', {
              type: 'text', placeholder: 'Idea text (required)',
              value: draftIdea.idea,
              onChange: ev => setDraftIdea({...draftIdea, idea: ev.target.value}),
              onKeyDown: ev => { if (ev.key === 'Enter') handleSaveIdea(); if (ev.key === 'Escape') setAddingIdea(false); },
              className: 'flex-1 border border-gray-300 rounded px-2 py-1 text-sm focus:outline-none focus:border-green-400',
              autoFocus: true
            }),
            e('input', {
              type: 'text', placeholder: 'Source (optional)',
              value: draftIdea.source,
              onChange: ev => setDraftIdea({...draftIdea, source: ev.target.value}),
              onKeyDown: ev => { if (ev.key === 'Enter') handleSaveIdea(); if (ev.key === 'Escape') setAddingIdea(false); },
              className: 'flex-1 border border-gray-300 rounded px-2 py-1 text-sm focus:outline-none focus:border-green-400'
            }),
            e('button', {onClick: handleSaveIdea, disabled: saving === 'saving', className: 'px-3 py-1 text-white text-xs font-medium rounded ' + (saving === 'saving' ? 'bg-yellow-500' : saving === 'saved' ? 'bg-green-700' : saving === 'error' ? 'bg-red-500' : 'bg-green-600 hover:bg-green-700')}, saving === 'saving' ? 'Saving...' : saving === 'saved' ? '✓ Saved' : saving === 'error' ? '✗ Error' : 'Save'),
            e('button', {onClick: () => { setAddingIdea(false); setDraftIdea({idea: '', source: ''}); }, className: 'px-3 py-1 bg-gray-200 text-gray-600 text-xs font-medium rounded hover:bg-gray-300'}, 'Cancel')
          )
        ) : null,
        e(DataTable, {tabId, rows, isManual, onClearManual: handleClear, feedback, setFeedback,
          onDislike: tabId === 'captions' ? onDislike : null,
          onLike:    tabId === 'captions' ? onLike    : null})
      );
    }

    function App() {
      const [activeTab, setActiveTab] = React.useState(() => localStorage.getItem('activeTab') || 'ideas');
      const [data,      setData]      = React.useState(() => { const d={}; TABS.forEach(t=>d[t.id]=[]); return d; });
      const [lastSync,  setLastSync]  = React.useState(null);
      const [polling,   setPolling]   = React.useState(false);
      const [isLocal,   setIsLocal]   = React.useState(false);
      const [feedback,  setFeedback]  = React.useState(() => {
        try { return JSON.parse(localStorage.getItem('caption_feedback') || '{}'); } catch(e) { return {}; }
      });

      React.useEffect(() => {
        localStorage.setItem('caption_feedback', JSON.stringify(feedback));
      }, [feedback]);

      React.useEffect(() => { if (window.location.protocol === 'file:') setIsLocal(true); }, []);

      const loadRef = React.useRef(null);

      React.useEffect(() => {
        if (isLocal) return;
        function load() {
          setPolling(true);
          fetchAllData()
            .then(r => {
              const pending = JSON.parse(localStorage.getItem('caption_analyzer_pending') || '[]');
              const analyzed = r.caption_analyzer || [];
              const stillPending = pending.filter(p =>
                !analyzed.some(x => x.original_caption === p.original_caption && x.date === p.date)
              );
              if (stillPending.length !== pending.length) {
                localStorage.setItem('caption_analyzer_pending', JSON.stringify(stillPending));
              }
              r.caption_analyzer = [...stillPending, ...analyzed];
              setData(r);
              setLastSync(Date.now());
              const hasPending = stillPending.length > 0;
              clearInterval(loadRef.current);
              loadRef.current = setInterval(load, hasPending ? 5000 : POLL_INTERVAL_MS);
            })
            .catch(() => {})
            .finally(() => setPolling(false));
        }
        load();
        loadRef.current = setInterval(load, POLL_INTERVAL_MS);
        return () => clearInterval(loadRef.current);
      }, [isLocal]);

      const rowCounts = React.useMemo(() => {
        const c = {}; TABS.forEach(t => c[t.id] = (data[t.id]||[]).length); return c;
      }, [data]);

      const dislikedCaptions = React.useMemo(() => {
        return (data.captions || []).filter(row => feedback[JSON.stringify(row)] === 'dislike');
      }, [data.captions, feedback]);

      const PENDING_KEY = 'caption_analyzer_pending';

      const handleDislike = (rowKey, row) => {
        setFeedback(prev => ({...prev, [rowKey]: 'dislike'}));
        const pending = JSON.parse(localStorage.getItem(PENDING_KEY) || '[]');
        const alreadyAdded = pending.some(p => p.original_caption === row.caption && p.date === row.date);
        if (!alreadyAdded) {
          const newEntry = {
            date: row.date, title: row.title || '',
            original_caption: row.caption,
            weakest_factors: '⏳ Анализирую...', what_to_improve: '⏳ Анализирую...', improved_caption: '⏳ Анализирую...'
          };
          localStorage.setItem(PENDING_KEY, JSON.stringify([newEntry, ...pending]));
          setData(prev => ({...prev, caption_analyzer: [newEntry, ...(prev.caption_analyzer || [])]}));
        }
      };

      const handleLike = (rowKey, row) => {
        setFeedback(prev => ({...prev, [rowKey]: 'like'}));
        const cur = JSON.parse(localStorage.getItem(PENDING_KEY) || '[]');
        const filtered = cur.filter(p => !(p.original_caption === row.caption && p.date === row.date));
        localStorage.setItem(PENDING_KEY, JSON.stringify(filtered));
        setData(prev => ({...prev, caption_analyzer: (prev.caption_analyzer || []).filter(p => !(p.original_caption === row.caption && p.date === row.date))}));
      };

      if (isLocal) {
        return e('div', {className:'min-h-screen bg-gray-50 flex items-center justify-center'},
          e('div', {className:'bg-white rounded-xl shadow p-10 max-w-md text-center'},
            e('h2', {className:'text-xl font-bold text-gray-800 mb-2'}, 'Open Online'),
            e('p',  {className:'text-gray-500 text-sm mb-4'}, 'Open it via GitHub Pages for live data.'),
            e('a',  {href:'https://alficcimo.github.io/dashboard/', className:'inline-block bg-blue-600 text-white px-5 py-2 rounded-lg text-sm font-medium'}, 'Open Dashboard')
          )
        );
      }

      return e('div', {className:'min-h-screen bg-gray-50'},
        e('div', {className:'bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between'},
          e('div', null,
            e('h1', {className:'text-lg font-bold text-gray-800'}, 'Content Farm Dashboard'),
            e('p',  {className:'text-xs text-gray-500'}, '@novaya_energia \u2014 Max Kibrik')
          ),
          e('div', {className:'flex gap-3 items-center'},
            e(SyncIndicator, {lastSync, polling, pollInterval: POLL_INTERVAL_MS})
          )
        ),
        e(TabBar, {activeTab, rowCounts, onTabChange: (id) => { setActiveTab(id); localStorage.setItem('activeTab', id); }}),
        TABS.map(tab => activeTab === tab.id
          ? e(TabPanel, {key: tab.id, tabId: tab.id, liveRows: data[tab.id]||[], feedback, setFeedback, onDislike: handleDislike, onLike: handleLike})
          : null
        )
      );
    }

    const rootEl = ReactDOM.createRoot(document.getElementById('root'));
    rootEl.render(e(App, null));
  </script>
</body>
</html>
