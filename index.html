<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Dashboard - Debug</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .error-box { background: #fee; border: 2px solid #f00; padding: 20px; margin: 10px; border-radius: 5px; }
        .success-box { background: #efe; border: 2px solid #0a0; padding: 20px; margin: 10px; border-radius: 5px; }
        .debug-log { font-family: monospace; font-size: 12px; background: #f5f5f5; padding: 10px; margin: 10px; max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>
    <div id="root"></div>
    <div id="debug-logs" class="debug-log"></div>
    
    <script type="text/babel">
        // Debug logging
        const logs = [];
        const debugDiv = document.getElementById('debug-logs');
        
        function logDebug(message) {
            logs.push(message);
            console.log('[DEBUG]', message);
            debugDiv.innerHTML = logs.map(l => `<div>${l}</div>`).join('');
        }
        
        logDebug('Script loaded');
        logDebug('React version: ' + React.version);
        logDebug('ReactDOM version: ' + typeof ReactDOM);
        
        // Check if root element exists
        const rootDiv = document.getElementById('root');
        logDebug('Root div found: ' + (rootDiv ? 'YES' : 'NO'));
        
        // Simple test component
        function App() {
            logDebug('App component rendering');
            return (
                <div className="p-8 bg-gradient-to-br from-blue-50 to-purple-50 min-h-screen">
                    <div className="success-box">
                        <h1 className="text-3xl font-bold mb-4">✅ Dashboard Loaded Successfully!</h1>
                        <p className="text-lg">If you can see this, React is working correctly.</p>
                        <p className="text-sm mt-4 text-gray-600">
                            Timestamp: {new Date().toLocaleString()}
                        </p>
                    </div>
                    
                    <div className="mt-8 p-6 bg-white rounded-lg shadow">
                        <h2 className="text-2xl font-bold mb-4">System Status</h2>
                        <div className="space-y-2 font-mono text-sm">
                            <div>✓ HTML loaded</div>
                            <div>✓ React: {React.version}</div>
                            <div>✓ ReactDOM loaded</div>
                            <div>✓ Babel transpiler working</div>
                            <div>✓ Tailwind CSS loaded</div>
                            <div>✓ Component rendered</div>
                        </div>
                    </div>
                </div>
            );
        }
        
        logDebug('Creating React root');
        
        try {
            const root = ReactDOM.createRoot(rootDiv);
            logDebug('React root created');
            
            root.render(<App />);
            logDebug('App component rendered to root');
        } catch (error) {
            logDebug('ERROR: ' + error.message);
            logDebug('Stack: ' + error.stack);
            rootDiv.innerHTML = '<div class="error-box"><h1>ERROR</h1><p>' + error.message + '</p></div>';
        }
        
        // Global error handler
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            logDebug('RUNTIME ERROR: ' + msg);
            logDebug('File: ' + url + ':' + lineNo + ':' + columnNo);
            return false;
        };
        
        logDebug('Debug setup complete');
    </script>
</body>
</html>
