<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.24.0/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  </style>
</head>
<body id="root" class="bg-gray-50"></body>

  <script type="text/babel">
    const TABS = [
      { id: 'ideas',           label: 'Ideas',           file: 'content-ideas.json' },
      { id: 'analyzed',        label: 'Analyzed',        file: 'content-analyzed.json' },
      { id: 'titles',          label: 'Titles',          file: 'content-titles.json' },
      { id: 'title_analyzer',  label: 'Title Analyzer',  file: 'content-title-analyzer.json' },
      { id: 'captions',        label: 'Captions',        file: 'content-captions.json' },
      { id: 'carousels',       label: 'Carousels',       file: 'content-carousels.json' },
      { id: 'feed',            label: 'Feed',            file: 'content-feed.json' },
      { id: 'improver',        label: 'Improver',        file: 'content-improver.json' },
    ];

    const POLL_INTERVAL_MS = 30000;

    async function fetchAllData() {
      const results = {};
      await Promise.all(
        TABS.map(async tab => {
          try {
            const response = await fetch(tab.file);
            if (response.ok) {
              results[tab.id] = await response.json();
              return;
            }
          } catch (e) {
            console.error(`Failed to fetch ${tab.file}:`, e);
          }
        })
      );
      return results;
    }

    function App() {
      const [activeTab, setActiveTab]     = React.useState('ideas');
      const [data, setData]               = React.useState(() => Object.fromEntries(TABS.map(t => [t.id, []])));
      const [lastSync, setLastSync]       = React.useState(null);
      const [polling, setPolling]         = React.useState(false);
      const [loadError, setLoadError]     = React.useState(null);

      React.useEffect(() => {
        async function load() {
          try {
            setPolling(true);
            const result = await fetchAllData();
            if (Object.keys(result).length > 0) {
              setData(result);
              setLoadError(null);
            }
            setLastSync(Date.now());
          } catch (error) {
            setLoadError(error.message);
            console.error('Data load error:', error);
          } finally {
            setPolling(false);
          }
        }

        load();
        const timer = setInterval(load, POLL_INTERVAL_MS);
        return () => clearInterval(timer);
      }, []);

      const activeData = data[activeTab] || [];
      const rowCounts = React.useMemo(
        () => Object.fromEntries(TABS.map(t => [t.id, (data[t.id] ?? []).length])),
        [data]
      );

      return (
        <div className="min-h-screen bg-gray-50 p-4 lg:p-8">
          <div className="max-w-7xl mx-auto">
            <div className="mb-8">
              <h1 className="text-4xl font-bold text-gray-900 mb-2">Content Dashboard</h1>
              <div className="flex items-center gap-4 text-sm text-gray-600">
                <span>Status: {polling ? '🔄 Syncing...' : '✓ Connected'}</span>
                {lastSync && <span>Last sync: {new Date(lastSync).toLocaleTimeString()}</span>}
              </div>
              {loadError && (
                <div className="mt-2 p-3 bg-yellow-50 border border-yellow-200 rounded text-yellow-800 text-sm">
                  ⚠️ {loadError}
                </div>
              )}
            </div>

            <div className="mb-6 overflow-x-auto bg-white rounded-lg shadow">
              <div className="flex border-b">
                {TABS.map(tab => (
                  <button
                    key={tab.id}
                    onClick={() => setActiveTab(tab.id)}
                    className={`flex-1 px-4 py-3 text-center font-medium border-b-2 transition whitespace-nowrap ${
                      activeTab === tab.id
                        ? 'border-blue-500 text-blue-600'
                        : 'border-transparent text-gray-600 hover:text-gray-900'
                    }`}
                  >
                    {tab.label} <span className="text-xs ml-1 opacity-70">({rowCounts[tab.id]})</span>
                  </button>
                ))}
              </div>
            </div>

            <div className="grid gap-4">
              {activeData.length > 0 ? (
                activeData.map((item, idx) => (
                  <div key={idx} className="bg-white rounded-lg shadow p-4 hover:shadow-md transition">
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                      {Object.entries(item).map(([key, value]) => (
                        <div key={key}>
                          <span className="text-xs font-semibold text-gray-500 uppercase">{key}</span>
                          <p className="text-gray-800 mt-1 line-clamp-3">{String(value).substring(0, 250)}</p>
                        </div>
                      ))}
                    </div>
                  </div>
                ))
              ) : (
                <div className="bg-white rounded-lg shadow p-12 text-center">
                  <p className="text-gray-500 mb-2">Loading content from JSON files...</p>
                  <p className="text-xs text-gray-400">Attempting to load: {TABS.map(t => t.file).join(', ')}</p>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
