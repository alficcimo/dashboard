<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Content Farm Dashboard</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
    .tab-inactive { border-bottom: 2px solid transparent; color: #6b7280; }
    .tab-inactive:hover { color: #374151; border-bottom: 2px solid #d1d5db; }
    .badge { display: inline-flex; align-items: center; justify-content: center;
             min-width: 20px; height: 20px; padding: 0 6px; border-radius: 10px;
             font-size: 11px; font-weight: 600; }
    .badge-active { background: #3b82f6; color: white; }
    .badge-inactive { background: #e5e7eb; color: #6b7280; }
    tr:hover td { background: #f9fafb; }
    .cell-long { max-width: 420px; white-space: pre-wrap; word-break: break-word; line-height: 1.5; }
    .upload-area { border: 2px dashed #d1d5db; border-radius: 8px; cursor: pointer; }
    .upload-area:hover { border-color: #3b82f6; background: #eff6ff; }
    thead th { position: sticky; top: 0; background: white; z-index: 1; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>
  <script>
    const TABS = [
      { id: 'ideas',     label: 'Ideas',     file: 'ideas.json' },
      { id: 'analyzed',  label: 'Analyzed',  file: 'analyzed.json' },
      { id: 'titles',    label: 'Titles',    file: 'titles.json' },
      { id: 'captions',  label: 'Captions',  file: 'captions.json' },
      { id: 'carousels', label: 'Carousels', file: 'carousels.json' }
    ];

    const COLUMN_CONFIG = {
      ideas:     ['date', 'source', 'idea'],
      analyzed:  ['date', 'idea', 'psychology', 'energy', 'king', 'magic_pill', 'summary'],
      titles:    ['date', 'title', 'angle', 'status'],
      captions:  ['date', 'title', 'caption', 'platform', 'framework', 'status'],
      carousels: ['date', 'title', 'carousel', 'caption_under', 'status']
    };

    const LONG_COLUMNS = new Set(['idea', 'caption', 'carousel', 'caption_under', 'psychology', 'energy', 'king', 'magic_pill', 'title', 'source']);

    function formatCellValue(val) {
      if (val === null || val === undefined) return '';
      if (typeof val === 'boolean') return val ? 'Yes' : 'No';
      if (typeof val === 'object') return JSON.stringify(val, null, 2);
      return String(val);
    }

    function App() {
      const [activeTab, setActiveTab] = React.useState('ideas');
      const [data, setData]           = React.useState({});
      const [loading, setLoading]     = React.useState(true);
      const [lastUpdate, setLastUpdate] = React.useState(null);

      const loadData = React.useCallback(async () => {
        const newData = {};
        const ts = new Date().getTime();
        for (const tab of TABS) {
          try {
            const res = await fetch(
              `https://raw.githubusercontent.com/alficcimo/dashboard/main/${tab.file}?t=${ts}`,
              {
                cache: 'no-store',
                headers: {
                  'Cache-Control': 'no-cache, no-store, must-revalidate',
                  'Pragma': 'no-cache',
                  'Expires': '0'
                }
              }
            );
            newData[tab.id] = res.ok ? await res.json() : [];
          } catch (e) {
            newData[tab.id] = [];
          }
        }
        setData(newData);
        setLoading(false);
        setLastUpdate(new Date().toLocaleTimeString());
      }, []);

      React.useEffect(() => {
        loadData();
        const iv = setInterval(loadData, 5000);
        return () => clearInterval(iv);
      }, [loadData]);

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const parsed = JSON.parse(ev.target.result);
            setData(prev => ({
              ...prev,
              [activeTab]: Array.isArray(parsed)
                ? [...parsed, ...(prev[activeTab] || [])]
                : prev[activeTab]
            }));
          } catch (_) {}
        };
        reader.readAsText(file);
      };

      const handleDrop = (e) => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const parsed = JSON.parse(ev.target.result);
            setData(prev => ({
              ...prev,
              [activeTab]: Array.isArray(parsed)
                ? [...parsed, ...(prev[activeTab] || [])]
                : prev[activeTab]
            }));
          } catch (_) {}
        };
        reader.readAsText(file);
      };

      const rows    = data[activeTab] || [];
      const columns = COLUMN_CONFIG[activeTab] || (rows.length > 0 ? Object.keys(rows[0]) : Object.keys(COLUMN_CONFIG));

      const e = React.createElement;

      return e('div', { className: 'min-h-screen bg-gray-50' },

        /* ── HEADER ── */
        e('div', { className: 'bg-white border-b border-gray-200 px-8 py-4' },
          e('div', { className: 'flex justify-between items-start' },
            e('div', {},
              e('h1', { className: 'text-2xl font-bold text-gray-900' }, 'Content Farm Dashboard'),
              e('p',  { className: 'text-sm text-gray-500 mt-0.5' }, '@novaya_energia — Max Kibrik')
            ),
            lastUpdate && e('div', { className: 'flex items-center gap-1.5 text-sm text-green-600 font-medium' },
              e('span', { className: 'w-2 h-2 rounded-full bg-green-500 inline-block' }),
              `Just updated · auto-refresh every 5s`
            )
          ),

          /* ── TABS ── */
          e('div', { className: 'flex gap-0 mt-4 border-b border-gray-200 -mb-px' },
            TABS.map(tab => {
              const count   = (data[tab.id] || []).length;
              const isActive = activeTab === tab.id;
              return e('button', {
                key: tab.id,
                onClick: () => setActiveTab(tab.id),
                className: `flex items-center gap-2 px-4 py-2 text-sm font-medium transition-colors mr-1 ${isActive ? 'tab-active' : 'tab-inactive'}`
              },
                tab.label,
                e('span', { className: `badge ${isActive ? 'badge-active' : 'badge-inactive'}` }, count)
              );
            })
          )
        ),

        /* ── TOOLBAR ── */
        e('div', { className: 'flex items-center justify-between px-8 py-3' },
          e('button', {
            className: 'flex items-center gap-1.5 px-3 py-1.5 bg-green-500 hover:bg-green-600 text-white text-sm font-medium rounded-md transition',
            onClick: () => {}
          }, '+ Add idea'),

          e('label', {
            className: 'upload-area flex items-center gap-2 px-4 py-1.5 text-sm text-gray-500 cursor-pointer',
            onDragOver: (ev) => ev.preventDefault(),
            onDrop: handleDrop
          },
            e('svg', { xmlns: 'http://www.w3.org/2000/svg', className: 'w-4 h-4', fill: 'none', viewBox: '0 0 24 24', stroke: 'currentColor' },
              e('path', { strokeLinecap: 'round', strokeLinejoin: 'round', strokeWidth: 2, d: 'M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12' })
            ),
            'Drop JSON to merge or click to upload',
            e('input', { type: 'file', accept: '.json', className: 'hidden', onChange: handleFileUpload })
          )
        ),

        /* ── TABLE ── */
        e('div', { className: 'px-8 pb-8' },
          e('div', { className: 'bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden' },
            loading
              ? e('div', { className: 'flex items-center justify-center py-20 text-gray-400' },
                  e('span', {}, 'Loading...')
                )
              : rows.length === 0
              ? e('div', { className: 'flex items-center justify-center py-20 text-gray-400 text-sm' },
                  'No data yet. Run the plugin to generate content.'
                )
              : e('div', { className: 'overflow-x-auto' },
                  e('table', { className: 'w-full text-sm' },
                    e('thead', {},
                      e('tr', { className: 'border-b border-gray-200' },
                        e('th', { className: 'px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider w-10' }, '#'),
                        columns.map(col =>
                          e('th', { key: col, className: 'px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider' }, col)
                        )
                      )
                    ),
                    e('tbody', { className: 'divide-y divide-gray-100' },
                      rows.map((row, i) =>
                        e('tr', { key: i, className: 'group' },
                          e('td', { className: 'px-4 py-3 text-gray-400 text-xs align-top' }, i + 1),
                          columns.map(col =>
                            e('td', {
                              key: `${i}-${col}`,
                              className: `px-4 py-3 text-gray-700 align-top ${LONG_COLUMNS.has(col) ? 'cell-long' : 'whitespace-nowrap'}`
                            }, formatCellValue(row[col]))
                          )
                        )
                      )
                    )
                  )
                )
          )
        )
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
