<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sci-Fi Author Captions - dY Content</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
  <div id="root"></div>
  
  <script type="text/babel">
    const CAPTIONS = [
      {
        date: "2026-03-19",
        title: "Sci-Fi Author: Harry Harrison Style",
        caption: "Открою вам ужас: вы все влюбились в имитацию друг друга. Потому что в момент любви мозг запускал химию воображения, и вы видели не человека, а фантазию. Теперь эта фантазия ушла — и вы смотрите на незнакомца.\n\nВот честный взгляд. Когда воображение умирает, умирает и чувство. Не потому что вы разлюбили — просто закончилась сказка. А люди без сказки — это просто соседи по кровати.\n\nЕсть ли выход? Конечно. Но это не романтично, так что мало кто выбирает его.\n\nВывод простой: любовь требует постоянной работы воображения. Без неё вы будете вместе, но одиноки."
      },
      {
        date: "2026-03-19",
        title: "Sci-Fi Author: Robert Asprin Style", 
        caption: "Открою секрет отношений. Когда партнер говорит \"люблю!\" — он врёт. Не потому что плохой, а потому что правда звучит странно: \"Я привык к твоему присутствию и боюсь перемен\".\n\nМы путаем привычку с чувством. Это как второй язык — говоришь на нем, потому что привык, а не потому что он красивый. Вот почему разлуки такие болезненные — не потому что теряем любовь, а потому что ломаем программу.\n\nВсе ищут страсть, но живут с привычкой. И это нормально — без привычки никто не смог бы построить ничего.\n\nТак что когда партнер кажется скучным — это не конец, это начало подлинных отношений."
      },
      {
        date: "2026-03-19",
        title: "Sci-Fi Author: Sheckley Style",
        caption: "Вот беда взрослых: мы разучились удивляться друг другу. Помните, как на первой встречи всё было чудо? Теперь даже маленькое чудо кажется обузой.\n\nПо-настоящему опасно то, что мы начинаем думать: \"Я знаю этого человека\". Ложь. Вы знаете привычку, а не человека. Человек меняется каждый день — вы просто перестали замечать.\n\nХитрость в том, чтобы сохранить любопытство. Не романтическое, а именно любопытство: кто этот человек СЕГОДНЯ? Какой он стал за ночь? Это звучит безумно, но это спасает отношения.\n\nБольшинство расставаний происходят потому, что люди решили: \"Я знаю всё о нём\". После этого дней осталось считать."
      },
      {
        date: "2026-03-19",
        title: "Sci-Fi Author: Clifford D. Simak Style",
        caption: "Современная любовь — это парадокс. Мы требуем от одного человека быть всем: возлюбленным, другом, психологом, вдохновением и финансовым советником. Вот почему все устают.\n\nВ старину люди это знали и просто жили вместе без иллюзий. Теперь мы ожидаем, что любовь решит все проблемы. Она их не решает. Она просто делает их совместными.\n\nОсновная ошибка: думать, что правильный человек будет правильным НАВСЕГДА. Люди меняются. Вы тоже. Иногда траектории сходятся, иногда расходятся. Это не трагедия, это геометрия.\n\nЕсли вы ожидаете, что любовь будет легкой — вы ошиблись. Но если вы готовы к тому, что это РАБОТА, которую стоит делать — тогда у вас есть шанс."
      },
      {
        date: "2026-03-19",
        title: "Sci-Fi Author: Philip K. Dick Style",
        caption: "Главный вопрос не в том, любите ли вы человека. Главный вопрос в том, КАКОГО человека вы любите: реального или созданного вашим сознанием?\n\nМы все одержимы этим. Встречаем человека, немедленно проецируем на него наши мечты, и потом удивляемся, что он не соответствует нашему сценарию. Это как смотреть фильм в своей голове, но роль исполняет реальный человек.\n\nРеальность? Реальность — это когда вы видите партнера таким, какой он есть, со всеми недостатками, и это вас не отпугивает. Это не романтично, это опасно. Потому что если вы видите правду и остаетесь — это уже не влюбленность, это выбор.\n\nВопрос в том: готовы ли вы любить РЕАЛЬНОГО человека, или вам нужна иллюзия?"
      }
    ];
    
    function App() {
      return (
        <div className="min-h-screen bg-gray-50">
          <div className="bg-gradient-to-r from-purple-600 to-blue-600 text-white">
            <div className="max-w-4xl mx-auto px-6 py-8">
              <h1 className="text-4xl font-bold mb-2">dY Content Farm</h1>
              <p className="text-lg opacity-90">Sci-Fi Author Philosophy on Relationships</p>
            </div>
          </div>
          
          <div className="max-w-4xl mx-auto px-6 py-8">
            <div className="space-y-8">
              {CAPTIONS.map((item, idx) => (
                <div key={idx} className="bg-white rounded-lg shadow-md p-6 border-l-4 border-purple-500 hover:shadow-lg transition">
                  <div className="text-sm text-gray-500 mb-2">{item.date}</div>
                  <h2 className="text-xl font-bold text-gray-800 mb-4">{item.title}</h2>
                  <div className="prose prose-sm max-w-none">
                    <p className="whitespace-pre-wrap text-gray-700 leading-relaxed font-serif italic">
                      {item.caption}
                    </p>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }
    
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
