    const EMBEDDED_DATA = {"ideas":[{"date":"2026-03-19","source":"https://reddit.com/r/relationships","idea":"Соцсети разрушают отношения эффективнее любой измены. Вот как"},{"date":"2026-03-19","source":"https://instagram.com/explore/tags/redflags/","idea":"Энергетические вампиры: почему они выбирают именно тебя а не других"},{"date":"2026-03-19","source":"https://reddit.com/r/JustNoSO","idea":"Газлайтинг: как распознать что тебя сводят с ума прямо сейчас"},{"date":"2026-03-19","source":"https://instagram.com/explore/tags/energy/","idea":"5 вещей которые крадут твою энергию каждый день. И ты даже не замечаешь"},{"date":"2026-03-19","source":"https://reddit.com/r/AskMen","idea":"Высокостатусный мужчина выбирает партнёра по этим 3 критериям. Не красота"},{"date":"2026-03-19","source":"https://instagram.com/explore/tags/mentalhealth/","idea":"3 слова которые мужчина не хочет слышать от женщины. Проверено на 1000 парах"},{"date":"2026-03-19","source":"https://instagram.com/explore/tags/relationships/","idea":"Почему женщины 2026 массово уходят из отношений где всё хорошо"},{"date":"2026-03-19","source":"https://instagram.com/explore/tags/boundaries/","idea":"Личные границы которые реально меняют отношения. Не то что ты думаешь"},{"date":"2026-03-19","source":"https://reddit.com/r/psychology","idea":"Почему умные люди страдают больше других. Парадокс интеллекта"},{"date":"2026-03-19","source":"https://reddit.com/r/dating_advice","idea":"Почему он исчезает после лучшего свидания в твоей жизни"}],"analyzed":[{"idea":"Соцсети убивают близость медленнее и вернее, чем измена. И ты позволяешь этому происходить каждый день","psychology":"Соцсети активируют механизм социального сравнения. Мозг постоянно сравнивает партнёра с отфильтрованными образами чужих жизней. Это создаёт хроническое лёгкое разочарование, которое накапливается незаметно, пока однажды человек не обнаруживает, что давно живёт рядом с чужим.","energy":"Каждый скролл в присутствии партнёра. Это выбор: быть здесь или там. Энергия присутствия утекает в экран, и отношения медленно превращаются в совместное одиночество. Пара физически рядом, но эмоционально на разных планетах.","king":"Я давно убрал телефон из спальни. Не потому что боюсь соблазна, а потому что понимаю цену присутствия. Женщина рядом со мной чувствует, что она важнее ленты новостей. Это редкость сегодня, и именно это создаёт настоящую близость.","magic_pill":"Введи одно правило прямо сегодня: телефоны убираются за час до сна. Без исключений. Через неделю ты удивишься, сколько разговоров вы не вели годами.","summary":"Соцсети разрушают отношения не через скандал, а через ежедневное маленькое предательство присутствия. Психологический механизм сравнения и энергетическая утечка работают в паре, создавая пропасть между людьми, которые считают себя близкими. Одно простое правило про телефон способно изменить качество отношений быстрее, чем годы разговоров о чувствах."},{"idea":"Энергетические вампиры выбирают тебя не случайно. В тебе есть конкретное качество, которое делает тебя идеальной жертвой","psychology":"Энергетические вампиры безошибочно считывают людей с гиперразвитой эмпатией и низкой толерантностью к чужому дискомфорту. Такие люди физически не могут уйти, пока другому плохо. Вампир это знает и использует как крючок.","energy":"Каждый контакт с вампиром оставляет характерный след: ты приходишь в разговор с энергией на 8, уходишь на 2, и не понимаешь куда делись остальные 6. Тело знает правду раньше головы: усталость после общения с конкретным человеком. Это не совпадение.","king":"Я научился замечать людей, которые всегда в кризисе, всегда нуждаются, никогда не меняются. Это не несчастные люди. Это люди, которые выбрали несчастье как инструмент влияния. Я сочувствую, но держу дистанцию.","magic_pill":"После каждого разговора задавай себе один вопрос: я чувствую себя лучше или хуже, чем до? Если ответ стабильно «хуже». Это твой сигнал, не объяснение.","summary":"Энергетические вампиры: не мистика, а люди с конкретным поведенческим паттерном, которые ищут тех, кто не умеет говорить нет. Твоя эмпатия: твоя сила, но без границ она становится уязвимостью. Один честный вопрос после каждого контакта способен изменить всю твою социальную жизнь."},{"idea":"Газлайтинг: не конфликт и не ложь. Это систематическое уничтожение твоей реальности изнутри","psychology":"Газлайтинг атакует не поступки человека, а его способность доверять собственному восприятию. Когда тебе регулярно говорят «этого не было», «ты придумываешь», «ты слишком остро реагируешь», мозг начинает сомневаться в собственных сенсорах. Это самый разрушительный вид манипуляции именно потому, что жертва теряет инструмент защиты: свою реальность.","energy":"Жизнь с газлайтером требует колоссальных энергозатрат на постоянную самопроверку: а вдруг я правда слишком остро? а вдруг я не помню правильно? Эта внутренняя война истощает сильнее любого физического труда, потому что она не прекращается даже во сне.","king":"Первый признак, который я всегда замечаю: человек, который никогда не ошибается и никогда не извиняется. Не потому что он идеален, а потому что его система защиты требует, чтобы неправым всегда был кто-то другой. От таких людей я держусь подальше.","magic_pill":"Начни вести голосовые заметки сразу после важных разговоров, говори что произошло своими словами. Через месяц у тебя будет доказательство того, что твоя память работает нормально.","summary":"Газлайтинг: не просто ложь, а методичное разрушение твоей способности доверять себе. Он работает через накопленную усталость и постоянную самопроверку, превращая тебя в заложника чужой версии реальности. Восстановление начинается с одного шага: зафиксировать свою версию событий раньше, чем её успеют переписать."},{"idea":"5 вещей которые сжигают твою энергию каждый день. Все они происходят до 10 утра","psychology":"Большинство энергетических утечек: не события, а привычки восприятия. Немедленная проверка телефона, прокручивание тревожных сценариев, мысленные диалоги с людьми которых нет рядом. Мозг тратит реальные ресурсы на воображаемые угрозы.","energy":"Утро задаёт тон всему дню. Первые 90 минут определяют базовый уровень энергии, с которым человек живёт следующие 12 часов. Большинство людей начинают день с немедленного погружения в чужие приоритеты: новости, мессенджеры, соцсети, и к полудню уже работают на остатках.","king":"Мои утра защищены. Первый час. Только я: тело, мысли, план. Телефон появляется не раньше чем я сам решу что готов. Это не дисциплина ради дисциплины. Это знание о том, как работает ресурс и как его сохранить.","magic_pill":"Завтра утром не трогай телефон первые 30 минут после пробуждения. Просто 30 минут. Замерь разницу в том, как ты себя чувствуешь к обеду.","summary":"Энергия не просто «расходуется». Она сжигается конкретными привычками, большинство из которых запускаются автоматически ещё до завтрака. Психологические утечки через тревогу и чужие приоритеты работают незаметно, но системно. Защита утра: самое высокодоходное вложение в собственный ресурс."},{"idea":"Высокостатусный мужчина смотрит не на внешность. Он оценивает три вещи которые большинство женщин даже не замечают","psychology":"Мужчины с реальным статусом давно прошли стадию, где внешность является первичным фильтром. Они ищут психологическую устойчивость, потому что нестабильный партнёр. Это постоянный источник хаоса в жизни, которую они строили годами. Тревожность, манипуляции и эмоциональные качели для них: красные флаги, не романтика.","energy":"Мужчина с ресурсами и целями несёт большую нагрузку. Ему нужен человек рядом, который добавляет энергию, а не отнимает её. Женщина, которая умеет быть в покое, сама знает чего хочет и не требует постоянного подтверждения. Это редкость и именно это ощущается как магнит.","king":"Я замечаю как женщина ведёт себя когда что-то идёт не по плану. Не когда всё хорошо, а в момент стресса, неопределённости, когда я занят и не отвечаю сразу. Это и есть настоящий характер. Именно там принимается решение.","magic_pill":"Перестань демонстрировать себя. Начни демонстрировать устойчивость. Следующий раз когда захочется написать первой или прояснить отношения: подожди. Посмотри что произойдёт.","summary":"Высокостатусный мужчина оценивает не упаковку, а содержание. Прежде всего психологическую зрелость и внутреннюю устойчивость. Энергетически он ищет партнёра который дополняет его жизнь, а не усложняет её. Самое парадоксальное: именно внутренняя независимость женщины создаёт ту притягательность, которую невозможно сыграть."},{"idea":"3 обычных слова которые выключают мужчину. Женщины говорят их каждый день не понимая что происходит","psychology":"Определённые фразы активируют в мужчине защитную реакцию «контроль/угроза» на уровне рефлекса, не на уровне рассуждений. Это не обиды и не ругательства. Это слова которые сигнализируют мозгу: тебя оценивают, тебя контролируют, тебя используют. Мужчина закрывается не назло. Он закрывается автоматически.","energy":"Когда мужчина чувствует что его слова и действия постоянно оцениваются и используются против него, он перестаёт вкладываться. Не из жестокости, а из самосохранения. Эмоциональное закрытие: не конец чувств, а конец безопасности.","king":"Я замечаю разницу между женщиной которая со мной и женщиной которая меня изучает. Одна создаёт пространство где я хочу открываться. Другая создаёт ощущение, что каждое моё слово будет использовано в будущем споре. С первой я остаюсь. Со второй: нет.","magic_pill":"Вместо «ты всегда» и «ты никогда» попробуй одну неделю говорить только «я чувствую» и «мне нужно». Это не слабость. Это язык на котором мужчины действительно слышат.","summary":"Слова разрушают мужское желание защищать не через их грубость, а через то, что они сигнализируют о недоверии и контроле. Психологический механизм закрытия срабатывает автоматически, лишая отношения тепла и близости. Изменение одного языкового паттерна, с обвинений на чувства, меняет всю динамику быстрее чем любой разговор «о нас»."},{"idea":"Женщины уходят из нормальных отношений. Это не кризис, а новый социальный феномен который мужчины не видят","psychology":"Современные женщины впервые в истории имеют экономическую независимость и социальное разрешение уйти. Это открывает доступ к ранее подавленному осознанию: отношения где «всё нормально» но нет роста, глубины и настоящего присутствия. Это не отношения, а договорённость о совместном быте.","energy":"«Нормальные» отношения без развития создают специфический вид истощения: не от конфликтов, а от монотонного присутствия без смысла. Женщина чувствует это раньше мужчины, потому что она эмоционально более настроена на качество связи. К тому моменту как мужчина замечает, решение уже принято.","king":"Я никогда не позволяю отношениям «устаканиться». Удобство убивает страсть вернее любого кризиса. Женщина рядом со мной должна чувствовать что я выбираю её. Не однажды, а каждый день. Это требует усилий, но именно это держит.","magic_pill":"Спроси партнёршу сегодня вечером: «Что бы ты хотела что мы делали вместе, но что мы не делаем?» И послушай ответ не для того чтобы возразить, а чтобы понять.","summary":"Уход из нормальных отношений: не каприз и не кризис среднего возраста, а рациональный выбор человека у которого наконец появились другие опции. Психологически это сигнал о том, что эмоциональные потребности в росте и присутствии не закрывались годами. Мужчина который понимает этот механизм, не теряет женщин из «нормальных» отношений."},{"idea":"Личные границы которые реально работают: не запреты, а декларация о том кто ты есть","psychology":"Большинство людей ставят границы как правила для других: «ты не должен так со мной». Это всегда проигрышная позиция, потому что апеллирует к чужой доброй воле. Настоящая граница: декларация о себе. «Я человек который не остаётся там где меня не уважают». Разница: фундаментальная.","energy":"Жизнь без настоящих границ требует постоянного мониторинга чужого поведения и реагирования на него. Это изматывает. Чёткие внутренние границы наоборот освобождают энергию, потому что ты перестаёшь ждать разрешения жить по своим правилам.","king":"Мои границы не обсуждаются. Они просто есть. Я не объясняю почему я не принимаю звонки после 22:00 или почему я не терплю пассивной агрессии. Люди которые остаются рядом, принимают это как данность. Те кто уходит, сами делают выбор.","magic_pill":"Определи одну ситуацию которая регулярно тебя злит или истощает. Спроси себя: какое правило о себе я должен был ввести давно, чтобы этого не происходило? Введи его сегодня.","summary":"Настоящие границы: не стены против других людей, а чёткое понимание кто ты и как с тобой можно. Переключение с «ты не должен» на «я не остаюсь» меняет всю динамику власти в отношениях. Один осознанный внутренний запрет сильнее тысячи разговоров о том что тебя обижает."},{"idea":"Умные люди страдают сильнее. Это не слабость, а цена определённой архитектуры мышления","psychology":"Развитый аналитический ум не отключается когда нужно просто прожить момент. Он продолжает искать причины, последствия и паттерны даже в личной боли. Это создаёт страдание в квадрате: само событие плюс бесконечный анализ события. Интеллект который помогает решать задачи становится инструментом самоистязания.","energy":"Умные люди тратят огромный энергетический ресурс на симуляцию будущего: они проигрывают сценарии, готовятся к худшему, обрабатывают то что ещё не случилось. Эта постоянная фоновая работа ума: невидимый, но реальный источник хронического истощения.","king":"Я научился замечать момент когда анализ перестаёт быть полезным и становится жеванием. Это разные вещи. Анализ ведёт к решению. Жевание ведёт только к следующему кругу. Уметь остановить ум. Это навык, который важнее любого IQ.","magic_pill":"Установи себе лимит: 10 минут на обдумывание проблемы, потом действие или намеренное переключение. Ум нужно учить останавливаться так же как тело учат расслабляться.","summary":"Интеллект: инструмент, и как любой инструмент он может работать против своего владельца. Умные люди страдают сильнее не потому что они слабее, а потому что их ум не умеет выключаться и превращает каждую боль в исследовательский проект. Осознанное ограничение анализа: парадоксально более умное решение, чем попытка проанализировать всё."},{"idea":"Он исчезает после идеального свидания. Причина не в тебе, а в том что происходит у него внутри в момент настоящей близости","psychology":"Мужчины с избегающим типом привязанности переживают настоящую близость как угрозу. Чем лучше свидание, тем сильнее паника после, потому что хорошее означает зависимость, а зависимость означает уязвимость. Исчезновение: не безразличие, а защитная реакция на то, что было слишком настоящим.","energy":"Настоящая близость требует открытости. А открытость для человека с травмой привязанности ощущается как смертельная опасность. После хорошего свидания такой мужчина буквально «перегревается» и ему нужно дистанцироваться чтобы восстановить ощущение контроля над собой.","king":"Я знаю этот паттерн. Я сам через него прошёл. Момент когда хочется убежать именно потому что стало хорошо. Это не сигнал бежать, а сигнал остановиться и спросить себя: чего я боюсь прямо сейчас? Осознанность здесь меняет всё.","magic_pill":"Если он исчез после хорошего вечера, не пиши первой в течение 5 дней. Не из игры, а потому что ему нужно время переварить собственную реакцию. Если не вернётся. У тебя есть ответ.","summary":"Мужское исчезновение после близости: не загадка и не жестокость, а предсказуемый паттерн избегающей привязанности. Чем лучше было свидание, тем сильнее срабатывает защитный механизм, превращая потенциальную близость в бегство. Понимание этого механизма не делает боль меньше, но убирает ложное чувство что ты сделала что-то не так."}],"titles":[{"date":"2026-03-19","title":"Нейробиологи нашли ЕДИНСТВЕННУЮ причину почему пары охладевают без скандалов (и она у тебя в кармане):"},{"date":"2026-03-19","title":"Есть конкретный процесс в мозге который запускается при каждом скролле танет «мы стали чужими, я не знаю когда это случилось».\n\n4. Просто видимый телефон на столе снижает качество разговора на 27%, даже если никто его не трогает. Университет Эссекса, 2013. Мозг знает что тебя могут прервать. И заранее выходит из контакта.\n\n5. Охлаждение без скандалов это не стабильность. Это анестезия. Пары продолжают делить кровать и отпуск. Просто контакт внутри отношений уже перестал биться.\n\n🔴 Ты замечал(а) что у вас стало меньше разговоров, хотя поводов для конфликтов нет? Хочешь узнать больше, ссылка в шапке профиля 💜\n\n✨ Если хочешь понять как остановить этот процесс до того как он стал необратимым, смотри разбор в тг, ссылка в шапке профиля 🌹"},{"date":"2026-03-19","title":"Есть конкретный процесс в мозге который запускается при каждом скролле рядом с партнёром. Никто об этом не предупреждает:","caption":"Когда ты скроллишь рядом с партнёром, твой мозг делает выбор. Не между постами. Между ним и лентой. Каждый выбор в пользу телефона фиксируется в нейронных путях как привычка. После ста таких выборов в неделю привязанность начинает переориентироваться.\n\nНейробиолог Эндрю Хуберман описывает это как «конкуренцию за дофаминовый бюджет». Телефон даёт предсказуемое вознаграждение каждые несколько секунд. Близость с человеком требует инвестиций и даёт награду нерегулярно. Мозг оптимизируется под первое.\n\nЭто не значит что вы разлюбили друг друга. Это значит что вы буквально тренируете мозг не нуждаться в партнёре как в источнике удовольствия. Без измен и ссор. Просто через ежедневные 20-минутные сессии скроллинга в одной кровати.\n\nСамое неудобное: это не видно изнутри. Вы оба думаете что всё нормально потому что нет конфликтов. Конфликты означают что людям ещё не всё равно. Тишина при двух экранах означает другое.\n\nЕсть один момент когда этот процесс ещё обратим. После него технически можно восстановить отношения, но это уже совсем другая работа и другая цена.\n\n🔴 Ты помнишь последний вечер когда вы оба были без телефонов и разговаривали просто потому что было интересно? Хочешь узнать больше, ссылка в шапке профиля 💜\n\n✨ Если хочешь понять где находится эта точка невозврата в твоих отношениях прямо сейчас, разбор в тг, ссылка в шапке профиля 🌹"},{"date":"2026-03-19","title":"Они сидели рядом три часа. Каждый в телефоне. То что разрушилось за эти три часа не вернуть никаким разговором:","caption":"1. Три часа в одной комнате с разными экранами это не отдых вместе. Это одиночество с декорацией близости. Мозг фиксирует: рядом со мной человек, но я ему не нужен прямо сейчас. Это не осознанная мысль. Это ощущение которое накапливается слой за слоем.\n\n2. Женщины считывают невнимание острее. Не потому что капризные. Потому что нервная система настроена на тонкие социальные сигналы точнее. Три часа без прямого контакта для неё это три часа сигнала «ты не приоритет».\n\n3. После таких вечеров люди не ссорятся. Они просто чуть меньше хотят разговаривать на следующий день. Потом ещё чуть меньше. Потом замечают что перестали делиться важным, но не могут назвать момент когда это началось.\n\n4. Разговор на следующий день не восстанавливает контакт который не случился вчера. Эмоциональная близость не хранится на счету. Её нельзя «добрать» в выходные то что не дали в будни.\n\n5. Три часа это много. За три часа двое людей могут стать настолько близкими что помнят этот вечер годами. Или провести время так чтобы не помнить ничего.\n\n🔴 Вы помните о чём последний раз разговаривали больше получаса без телефона в руках? Хочешь узнать больше, ссылка в шапке профиля 💜\n\n✨ Если хочешь конкретный протокол как вернуть настоящий контакт в вечера когда оба устали, смотри в тг, ссылка в шапке профиля 🌹"},{"date":"2026-03-19","title":"Есть ТОЧНЫЙ момент когда близость в паре начинает умирать. Большинство пропускает его потому что он выглядит невинно:","caption":"Этот момент не выглядит как кризис. Он выглядит как обычный вечер. Один из вас первый достаёт телефон пока второй ещё что-то рассказывает. Второй видит это. Не злится. Просто немного договаривает. Быстрее. И в следующий раз начинает чуть меньше.\n\nЧерез несколько месяцев таких вечеров появляется ощущение «мне не с кем поговорить по-настоящему». При живом партнёре рядом. Это не преувеличение. Это точное описание того как разрушается близость когда оба технически присутствуют но не контактируют.\n\nПсихолог Эстер Перель говорит что современные пары живут в хроническом «частичном присутствии». Тело здесь. Внимание где-то ещё. Партнёр получает не тебя, а твою оболочку.\n\nСамое коварное в этом процессе: ты не замечаешь что перестал(а) делиться важным пока однажды не поймёшь что последние полгода рассказывал(а) всё значимое подруге или другу. Не партнёру.\n\nЭтот момент всегда выглядит невинно. Потому что это просто телефон. Просто на минуту. Просто проверить.\n\n🔴 Ты замечал(а) что начал(а) реже делиться важным с партнёром, хотя конкретного повода нет? Хочешь узнать больше, ссылка в шапке профиля 💜\n\n✨ Если хочешь узнать как именно выглядит этот момент и что с ним делать до того как он стал привычкой, смотри разбор в тг, ссылка в шапке профиля 🌹"},{"date":"2026-03-19","title":"Я убрал телефон из спальни два года назад. Она сказала одну фразу через неделю которую я запомнил навсегда:","caption":"1. Первые три дня без телефона в спальне были неудобными. Руки тянулись к тумбочке. Мозг придумывал поводы: а вдруг важное, а вдруг пропущу. Это и есть зависимость. Не наркотическая. Поведенческая. Механизм тот же самый.\n\n2. На четвёртый день она первой заговорила в темноте. Просто так. О чём-то незначительном. Но это было первый раз за долгое время когда мы разговаривали лёжа без конкретной причины. Как раньше.\n\n3. Через неделю она сказала одну фразу. Я не буду её пересказывать потому что она была очень личной. Но суть: она сказала что давно не чувствовала что я здесь. Именно здесь. Не в командировке, не на работе. В нашей кровати. Рядом с ней.\n\n4. Телефон в спальне это не просто гаджет. Это третий человек в отношениях. Который всегда интереснее, всегда доступен, и никогда не устаёт от тебя.\n\n5. Два года спустя это правило стало самым дешёвым и самым ценным вложением в отношения из всего что я делал за последние годы.\n\n🔴 Когда ты последний раз засыпал(а) рядом с партнёром без телефона в руках просто разговаривая? Хочешь узнать больше, ссылка в шапке профиля 💜\n\n✨ Если хочешь конкретный протокол как ввести это правило без скандала и без сопротивления, смотри в тг, ссылка в шапке профиля 🌹"},{"date":"2026-03-19","title":"Есть одна вещь которую высокостатусный мужчина НИКОГДА не делает рядом с женщиной которую уважает (и это не про деньги):","caption":"Высокостатусный мужчина понимает что его внимание это ресурс. Не деньги, не статус, не внешность. Именно внимание. Когда он его отдаёт, человек чувствует это физически. Когда он достаёт телефон в разговоре, он сигнализирует: ты не стоишь моего полного присутствия прямо сейчас.\n\nЖенщины не всегда называют это вслух. Но они запоминают. Не как обиду. Как информацию о том кто перед ними. Мозг сортирует людей на тех кто видит тебя по-настоящему и тех кто только создаёт видимость. Телефон в разговоре это маркер второй категории.\n\nНастоящий авторитет не строится на связях и достижениях. Он строится на том что когда ты разговариваешь с человеком, у него нет ощущения что он конкурирует за твоё внимание с уведомлениями. Это редкость в 2025 году. И это замечают с первой встречи.\n\nЕсть простой тест. Понаблюдай за собой в следующем важном разговоре. Сколько раз тебя потянуло проверить телефон. Не потому что ждёшь срочного. Просто рефлекс. Это твой реальный уровень присутствия.\n\nВысокостатусный мужчина не делает этого не потому что у него нет телефона. Потому что он осознанно решил кому отдаёт своё внимание прямо сейчас. И это видно без слов.\n\n🔴 Ты замечал(а) что когда кто-то достаёт телефон в разговоре с тобой, ты сразу чувствуешь что разговор закончился? Хочешь узнать больше, ссылка в шапке профиля 💜\n\n✨ Если хочешь понять как присутствие становится самым мощным инструментом влияния, смотри разбор в тг, ссылка в шапке профиля 🌹"},{"date":"2026-03-19","title":"Пара ввела одно правило про телефон. Через 9 дней он сказал ей то чего не говорил 4 года:","caption":"1. Правило было простым: телефоны уходят в другую комнату в 22:00. Без исключений и без обсуждений. Они не договаривались «быть ближе». Они просто убрали то что мешало близости быть естественной.\n\n2. Первые три дня были неловкими. Они не знали о чём говорить. Это само по себе было открытием: оказалось что телефон годами заполнял паузы которые раньше превращались в настоящие разговоры.\n\n3. На шестой день она начала рассказывать про свою маму. Что-то что копилось несколько месяцев. Он слушал. По-настоящему слушал. Без половины внимания где-то ещё.\n\n4. На девятый день он сказал ей то чего не говорил четыре года. Не потому что нашёл правильные слова. Потому что наконец был достаточно здесь чтобы почувствовать что хочет это сказать.\n\n5. Это не история про магию. Это про то что близость не требует усилий. Она требует отсутствия помех. Телефон был помехой. Его убрали. Остальное случилось само.\n\n🔴 Ты думал(а) что вам нужна терапия или «серьёзный разговор», хотя может быть достаточно одного правила на вечер? Хочешь узнать больше, ссылка в шапке профиля 💜\n\n✨ Если хочешь конкретно как ввести это правило без сопротивления со стороны партнёра, смотри в тг, ссылка в шапке профиля 🌹"},{"date":"2026-03-19","title":"3 вещи которые происходят в паре когда телефоны исчезают за час до сна. Третья меня ПОРАЗИЛА больше всего:","caption":"1. Тишина перестаёт быть неловкой. За годы с телефоном тишина стала сигналом «нужно что-то сделать». Без него она становится просто тишиной. Потом в неё начинают прорастать слова которые не находили места раньше.\n\n2. Появляются разговоры которые невозможно начать при свете и при экранах. Что-то в темноте без телефона открывает другой уровень честности. Люди говорят то что копилось неделями. Не потому что решили поговорить. Просто потому что больше нечем заполнить пространство.\n\n3. Качество сна улучшается у обоих. Но дело не в синем свете как говорят все статьи. Дело в том что мозг перестаёт быть в режиме ожидания уведомлений. Нервная система успокаивается. И то как вы просыпаетесь рядом с человеком начинает ощущаться физически иначе. Вот это поразило меня больше всего.\n\n4. Все три вещи связаны. Это не про телефон. Это про то что вы создаёте пространство где может существовать близость. Телефон не враг. Просто он очень хорошо заполняет пространство которое должно оставаться пустым.\n\n5. За час до сна без экранов пара получает то что большинство ищет в терапии годами. Просто никто не говорит об этом достаточно прямо.\n\n🔴 Ты пробовал(а) хотя бы одну неделю без телефона за час до сна или сразу находилось «но у меня важные дела»? Хочешь узнать больше, ссылка в шапке профиля 💜\n\n✨ Если хочешь знать что именно говорить партнёру чтобы он согласился попробовать это правило, разбор в тг, ссылка в шапке профиля 🌹"},{"date":"2026-03-19","title":"Самое РАЗРУШИТЕЛЬНОЕ для отношений происходит не в момент ссоры. Оно происходит в тишине когда всё как будто хорошо:","caption":"Ссора это кризис. В кризисе люди ещё борются. Кричат, обвиняют, требуют. Это больно. Но это живо. Самое разрушительное для отношений это не кризис. Это медленная анестезия которая приходит в тишине когда всё как будто в порядке.\n\nВыглядит это так: вы оба устали, вы рядом, вы не ссоритесь. Просто каждый в своём пространстве. Завтра снова. И послезавтра. Постепенно исчезает привычка делиться мелочами. Потом исчезает желание. Потом появляется незнакомец в соседней кровати с которым ты делишь ипотеку и отпуск.\n\nПары которые доходят до развода после 10-15 лет брака описывают одно и то же: «мы не ругались, просто разошлись». Это и есть тихое разрушение. Оно не шумит. Оно занимает место которое раньше занимала близость.\n\nСемейный терапевт Джон Готтман называет это «эмоциональным выходом из контакта». Не измена и не кризис. Когда люди перестают эмоционально инвестировать в отношения. Тихо. По чуть-чуть. Каждый вечер.\n\nПарадокс: самое опасное состояние отношений выглядит как стабильность. Ты не видишь проблему потому что нет симптомов. Симптом это и есть отсутствие близости при сохранённой форме.\n\n🔴 Ты сейчас в отношениях где всё «нормально» но не можешь вспомнить когда последний раз была настоящая близость? Хочешь узнать больше, ссылка в шапке профиля 💜\n\n✨ Если хочешь понять как распознать тихое разрушение до точки невозврата, смотри разбор в тг, ссылка в шапке профиля 🌹"},{"date":"2026-03-19","title":"Семейные терапевты видят ОДНУ и ту же вещь у пар которые расходятся спокойно (и это не про измену и не про деньги):","caption":"Семейные терапевты работают с сотнями пар. Они видят паттерны которые партнёры не видят изнутри. И у пар которые расходятся тихо, без скандалов, без измен, без драмы есть одна общая вещь. Не то что большинство думает.\n\nЭто не потеря уважения и не разные ценности. Это хроническое присутствие без контакта. Они были рядом. Они не ссорились. Они просто перестали по-настоящему видеть друг друга. Каждый день. Понемногу. До тех пор пока однажды не оказалось что смотреть не на кого.\n\nЭстер Перель описывает это как «смерть от тысячи маленьких отсутствий». Не один большой удар. Сто тысяч маленьких моментов когда один из вас был не здесь. Телефон. Усталость. Мысли о работе. Суммарно это годы прожитые рядом но не вместе.\n\nСамое тяжёлое в этом: его почти невозможно заметить изнутри потому что всё ощущается как норма. Ты привыкаешь к уровню близости. И начинаешь считать его нормальным. Даже если он очень низкий.\n\nТерапевты видят эту вещь у всех таких пар. И почти никогда не видят её у тех кто остался вместе.\n\n🔴 Ты знаешь на каком уровне близости ты сейчас находишься или просто привык(ла) к тому что есть? Хочешь узнать больше, ссылка в шапке профиля 💜\n\n✨ Если хочешь конкретно как эту вещь увидеть и изменить до того как она стала финальной, смотри разбор в тг, ссылка в шапке профиля 🌹"}],"carousels":[],"feed":[],"improver":[]};

    const TABS = [
      { id: 'ideas',          label: 'Ideas',          file: 'content-ideas.json' },
      { id: 'analyzed',       label: 'Analyzed',       file: 'content-analyzed.json' },
      { id: 'titles',         label: 'Titles',         file: 'content-titles.json' },
      { id: 'title_analyzer', label: 'Title Analyzer', file: 'content-title-analyzer.json' },
      { id: 'captions',       label: 'Captions',       file: 'content-captions.json' },
      { id: 'carousels',      label: 'Carousels',      file: 'content-carousels.json' },
      { id: 'feed',           label: 'Feed Analyzer',  file: 'content-feed.json' },
      { id: 'improver',       label: 'Improver',       file: 'content-improver.json' },
    ];

    const POLL_INTERVAL_MS = 30000; // 30 seconds

    /* === FETCH ALL JSON FILES === */

    
    async function fetchAllData() {
      const results = {};
      await Promise.all(
        TABS.map(async tab => {
          try {
            // Try live fetch first
            const res = await fetch(tab.file + '?_=' + Date.now());
            if (res.ok) {
              results[tab.id] = await res.json();
              return;
            }
          } catch {}
          // Fallback to embedded data
          results[tab.id] = EMBEDDED_DATA[tab.id] || [];
        })
      );
      return results;
    }


    /* === COMPONENTS === */

    function SyncIndicator({ lastSync, polling }) {
      const [elapsed, setElapsed] = React.useState(0);

      React.useEffect(() => {
        if (!lastSync) return;
        const interval = setInterval(() => {
          setElapsed(Math.floor((Date.now() - lastSync) / 1000));
        }, 1000);
        return () => clearInterval(interval);
      }, [lastSync]);

      if (!lastSync) {
        return (
          <span className="text-xs text-gray-400">
            {polling ? '⏳ Loading...' : '⚠️ No connection'}
          </span>
        );
      }

      const color = elapsed < 35 ? 'text-green-600' : elapsed < 70 ? 'text-yellow-600' : 'text-red-500';
      return (
        <span className={`text-xs font-medium flex items-center gap-1 ${color}`}>
          <span className="inline-block w-2 h-2 rounded-full bg-current"></span>
          {elapsed < 5 ? 'Just updated' : `Updated ${elapsed}s ago`}
          {' · '}
          <span className="text-gray-400 font-normal">auto-refresh every 30s</span>
        </span>
      );
    }

    function TabBar({ activeTab, rowCounts, onTabChange }) {
      return (
        <div className="flex border-b border-gray-300 bg-white overflow-x-auto sticky top-0 z-10 shadow-sm">
          {TABS.map(tab => {
            const count = rowCounts[tab.id] ?? 0;
            const isActive = activeTab === tab.id;
            return (
              <button
                key={tab.id}
                onClick={() => onTabChange(tab.id)}
                className={`px-4 py-3 text-sm font-medium whitespace-nowrap border-b-2 transition-colors ${
                  isActive
                    ? 'border-blue-500 text-blue-600 bg-blue-50'
                    : 'border-transparent text-gray-600 hover:text-gray-900 hover:bg-gray-50'
                }`}
              >
                {tab.label}
                {count > 0 && (
                  <span className={`ml-2 px-2 py-0.5 rounded-full text-xs font-semibold ${
                    isActive ? 'bg-blue-100 text-blue-700' : 'bg-gray-200 text-gray-600'
                  }`}>
                    {count}
                  </span>
                )}
              </button>
            );
          })}
        </div>
      );
    }

    function DropZone({ onLoad, error, setError }) {
      const inputRef = React.useRef(null);
      const [dragging, setDragging] = React.useState(false);

      function processFile(file) {
        if (!file) return;
        if (file.size > 5 * 1024 * 1024) { setError('File too large (max 5MB)'); return; }
        if (!file.name.toLowerCase().endsWith('.json')) { setError('Must be a .json file'); return; }
        const reader = new FileReader();
        reader.onload = e => {
          try {
            const parsed = JSON.parse(e.target.result);
            if (!Array.isArray(parsed)) throw new Error('JSON must be an array');
            setError(null);
            onLoad(parsed);
          } catch { setError('Invalid JSON — file not loaded'); }
        };
        reader.readAsText(file);
      }

      return (
        <div className="px-4 pt-3 pb-1">
          <div
            onClick={() => inputRef.current?.click()}
            onDragOver={e => { e.preventDefault(); setDragging(true); }}
            onDragLeave={() => setDragging(false)}
            onDrop={e => { e.preventDefault(); setDragging(false); processFile(e.dataTransfer.files[0]); }}
            className={`border-2 border-dashed rounded-lg p-3 text-center cursor-pointer transition-colors ${
              dragging ? 'border-blue-400 bg-blue-50'
              : error ? 'border-red-400 bg-red-50'
              : 'border-gray-200 bg-white hover:border-blue-300 hover:bg-blue-50'
            }`}
          >
            {error
              ? <p className="text-red-600 text-xs font-medium">{error}</p>
              : <p className="text-gray-400 text-xs">{dragging ? '📂 Drop it!' : '📁 Drop JSON to merge with live data · or click to upload'}</p>
            }
            <input ref={inputRef} type="file" accept=".json,.JSON" className="hidden"
              onChange={e => processFile(e.target.files[0])} />
          </div>
        </div>
      );
    }

    function DataTable({ tabId, rows, isManual, onClearManual }) {
      const columns = COLUMN_DEFS[tabId] ?? [];

      return (
        <div>
          {isManual && (
            <div className="px-4 py-1.5 bg-amber-50 border-b border-amber-200 flex items-center justify-between">
              <span className="text-xs text-amber-700 font-medium">📁 Merged: uploaded + live data · {rows.length} rows total</span>
              <button onClick={onClearManual}
                className="text-xs text-amber-600 hover:text-amber-800 underline">
                Remove upload · live only
              </button>
            </div>
          )}
          <div className="overflow-x-auto">
            <table className="min-w-full text-sm border-collapse">
              <thead>
                <tr>
                  <th className="px-3 py-2 text-left font-semibold text-gray-600 border border-gray-300 bg-gray-100 whitespace-nowrap text-xs sticky top-0 z-10">#</th>
                  {columns.map(col => (
                    <th key={col} className="px-3 py-2 text-left font-semibold text-gray-600 border border-gray-300 bg-gray-100 whitespace-nowrap text-xs sticky top-0 z-10">
                      {col}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {rows.length === 0 ? (
                  <tr>
                    <td colSpan={columns.length + 1} className="px-3 py-8 text-center text-gray-400 text-sm">
                      No data yet. Run the skill to populate this tab.
                    </td>
                  </tr>
                ) : (
                  rows.map((row, i) => (
                    <tr key={i} className={i % 2 === 0 ? 'bg-white' : 'bg-gray-50'}>
                      <td className="px-3 py-2 border border-gray-200 text-gray-400 text-xs select-none">{i + 1}</td>
                      {columns.map(col => (
                        <td key={col}
                          className={`px-3 py-2 border border-gray-200 text-gray-800 align-top max-w-xs ${
                            MULTILINE_COLS.has(col) ? 'whitespace-pre-wrap' : 'whitespace-normal'
                          }`}
                        >
                          {row[col] ?? ''}
                        </td>
                      ))}
                    </tr>
                  ))
                )}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function mergeRows(uploaded, live) {
      // Deduplicate by JSON fingerprint — uploaded rows go first (they're "newer")
      const seen = new Set(live.map(r => JSON.stringify(r)));
      const uniqueUploaded = uploaded.filter(r => !seen.has(JSON.stringify(r)));
      return [...uniqueUploaded, ...live];
    }

    function TabPanel({ tabId, liveRows }) {
      const [merged, setMerged] = React.useState(null); // null = use live only
      const [error, setError]   = React.useState(null);

      // When live data updates, re-merge if we have manual rows stored
      const manualRef = React.useRef(null);
      React.useEffect(() => {
        if (manualRef.current) {
          setMerged(mergeRows(manualRef.current, liveRows));
        }
      }, [liveRows]);

      function handleUpload(uploaded) {
        manualRef.current = uploaded;
        setMerged(mergeRows(uploaded, liveRows));
        setError(null);
      }

      function handleClear() {
        manualRef.current = null;
        setMerged(null);
        setError(null);
      }

      const rows     = merged ?? liveRows;
      const isManual = merged !== null;

      return (
        <div>
          <DropZone onLoad={handleUpload} error={error} setError={setError} />
          <DataTable
            tabId={tabId}
            rows={rows}
            isManual={isManual}
            onClearManual={handleClear}
          />
        </div>
      );
    }

    /* === APP ROOT === */

    function App() {
      const [activeTab, setActiveTab]     = React.useState('ideas');
      const [data, setData]               = React.useState(() => Object.fromEntries(TABS.map(t => [t.id, []])));
      const [lastSync, setLastSync]       = React.useState(null);
      const [polling, setPolling]         = React.useState(false);
      const [isLocalFile, setIsLocalFile] = React.useState(false);

      React.useEffect(() => {
        if (window.location.protocol === 'file:') setIsLocalFile(true);
      }, []);

      React.useEffect(() => {
        if (isLocalFile) return;

        async function load() {
          setPolling(true);
          try {
            const result = await fetchAllData();
            setData(result);
            setLastSync(Date.now());
          } catch {}
          finally { setPolling(false); }
        }

        load();
        const timer = setInterval(load, POLL_INTERVAL_MS);
        return () => clearInterval(timer);
      }, [isLocalFile]);

      const rowCounts = React.useMemo(
        () => Object.fromEntries(TABS.map(t => [t.id, (data[t.id] ?? []).length])),
        [data]
      );

      if (isLocalFile) {
        return (
          <div className="min-h-screen bg-gray-50 flex items-center justify-center">
            <div className="bg-white rounded-xl shadow p-10 max-w-md text-center">
              <div className="text-4xl mb-4">🌐</div>
              <h2 className="text-xl font-bold text-gray-800 mb-2">Open via Netlify</h2>
              <p className="text-gray-500 text-sm mb-4">
                This dashboard auto-fetches live data from the internet.
                Open it online instead of as a local file.
              </p>
              <a href="https://rainbow-tanuki-2e0230.netlify.app"
                className="inline-block bg-blue-600 text-white px-5 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors">
                Open Dashboard Online
              </a>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-gray-50">
          <div className="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between">
            <div>
              <h1 className="text-lg font-bold text-gray-800">📊 Content Farm Dashboard</h1>
              <p className="text-xs text-gray-500">@novaya_energia · Max Kibrik</p>
            </div>
            <SyncIndicator lastSync={lastSync} polling={polling} />
          </div>
          <TabBar activeTab={activeTab} rowCounts={rowCounts} onTabChange={setActiveTab} />
          {TABS.map(tab =>
            activeTab === tab.id && (
              <TabPanel
                key={tab.id}
                tabId={tab.id}
                liveRows={data[tab.id] ?? []}
              />
            )
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

  </script>
</body>
</html>
